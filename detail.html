    const dayGuides = {
      6: {
        intro: [
          'Dieser Tag sollte bewusst anders sein als die reinen Atlantiktage. Ihr seid dann schon mehrere Tage in Moliets, wahrscheinlich mit Sand, Wellen, Wind und vielleicht einem ersten Surfkurs. Der Lac de Léon und der Courant d’Huchet bringen einen anderen Rhythmus: ruhigeres Wasser, mehr Grün, mehr Schatten und eine Landschaft, die sich fast wie ein kleiner Gegenentwurf zum offenen Strand anfühlt.',
          'Der Courant d’Huchet ist der natürliche Abfluss des Étang de Léon Richtung Atlantik. Das Spannende daran ist nicht ein einzelner Aussichtspunkt, sondern der Übergang der Landschaften: See, Feuchtgebiet, Wald, Dünen und Mündung liegen sehr nah beieinander. Für euch muss daraus aber keine große Naturkundewanderung werden. Besser ist ein klarer Halbtagesplan: erst Lac de Léon, dann ein gut gewählter Abschnitt am Courant oder eine organisierte Bootsfahrt prüfen. Danach zurück, Pause, eventuell später noch einmal kurz an den Strand.',
          'Mit Kindern ist der See wahrscheinlich der bessere Einstieg als der Flusslauf. Am Lac de Léon habt ihr weniger Wellen, mehr Ruhe und mehr Picknick-Logik. Der Courant ist der besondere Teil für euch Erwachsene: diese Mischung aus Landes-Wald, Wasserlauf und fast tropisch wirkender Vegetation. Gerade nach mehreren Tagen Atlantik fühlt sich das wie ein Ortswechsel an, ohne dass ihr weit fahren müsst.'
        ],
        plan: ['Vormittags Lac de Léon: ruhigeres Wasser, Picknick, Schatten suchen.','Danach Courant d’Huchet als Spaziergang oder Bootsfahrt prüfen.','Später Nachmittag frei halten: Pool, Unterkunft oder kurzer Strandabschluss.'],
        recommendation: 'Heute nicht wieder Plage Centrale. Genau an diesem Punkt der Reise ist Abwechslung wertvoll. Der See ist für die Kinder entspannter, der Courant für euch landschaftlich interessanter. Verkauft den Tag nicht als lange Wanderung, sondern als Entdeckertour mit Wasser, Schatten und Picknick.',
        logistics: ['Mückenschutz einpacken.','Für Picknick und Wasser selbst sorgen.','Bootstouren und Regeln der Reserve vorher prüfen; private Navigation ist am Courant nicht einfach frei möglich.','Wenn es sehr heiß ist, nur den Vormittag nutzen und nachmittags konsequent Pause machen.'],
        sourceNote: 'Recherchenotiz: Der Courant d’Huchet verbindet den Étang de Léon mit dem Atlantik und gehört zur nationalen Naturreserve. Der See und die Reserve sind daher nicht nur Bade-/Spazierziele, sondern ein empfindlicher Naturraum.'
      },
      15: {
        intro: [
          'Der Luberon ist eine der schönsten Provence-Landschaften: Kalkstein, Dörfer, Ocker, Aussicht, Postkartenfarben. Gleichzeitig ist er im August touristisch, heiß und von Le Tholonet aus kein kleiner Spaziergang. Klassische Ziele wie Gordes und Roussillon liegen eher im nördlichen und westlichen Luberon. Das bedeutet: zusätzliche Autofahrzeit, enge Straßen, Parkplatzthemen und Kinder, die irgendwann nicht mehr zwischen schönem Dorf Nummer eins und schönem Dorf Nummer zwei unterscheiden.',
          'Für euch würde ich den Tag deshalb nicht als große Luberon-Runde planen. Nicht Gordes plus Roussillon plus noch ein Dorf plus Lavendel plus Markt. Das wird mit 8 und 10 Jahren in der Hitze schnell zur Erwachsenenidee. Wenn ihr fahrt, dann früh, maximal ein Hauptziel und ein Bonus. Gordes ist stark für Aussicht und das klassische Provence-Bild. Roussillon ist für Kinder oft greifbarer, weil die Ockerfarben, roten Felsen und Wege visueller sind.',
          'Die wichtigste Entscheidung ist morgens: Habt ihr wirklich Lust auf Auto? Wenn ja, dann kann der Luberon ein sehr schöner Halbtagesausflug sein. Wenn die Motivation mittel ist, ist Aix mit Calissons und anschließend Pool die bessere Entscheidung. Das ist kein Verzicht, sondern gutes Urlaubsmanagement.'
        ],
        plan: ['Früh starten, nicht nach einem trägen Vormittag.','Maximal ein Dorf ernsthaft anschauen, optional ein zweites nur kurz.','Nach Mittag zurück Richtung Unterkunft und Pool.'],
        recommendation: 'Macht den Luberon nur, wenn ihr morgens wirklich Lust auf Auto habt. Wenn ja: Roussillon ist für Kinder wahrscheinlich greifbarer als Gordes, weil die Ockerfarben etwas Spielerisches haben. Gordes ist schöner als Aussicht, aber weniger kindlich. Wenn die Energie mittel ist: Aix + Calissons + Pool ist die bessere Entscheidung.',
        logistics: ['Parkplätze vorher prüfen.','Nicht zur Mittagshitze durch volle Dörfer laufen.','Picknick nur, wenn Schatten realistisch ist; sonst lieber kurz essen und zurück.','Keine drei Dörfer planen. Das klingt auf der Karte harmlos und fühlt sich vor Ort schnell zäh an.'],
        sourceNote: 'Recherchenotiz: Der Luberon ist ein großes Kalkstein-Massiv und Naturparkgebiet; Gordes, Roussillon und Apt liegen nördlich des Massivs. Für euch ist daher Auswahl wichtiger als Vollständigkeit.'
      }
    };

    const dayImageQueries = [
      ['Tours Loire','Tours old town Loire','Guinguette de Tours','Tours market'],
      ['Tours Loire','Les Halles de Tours','Loire a Velo Tours','Aquarium de Touraine'],
      ['Vouvray Loire canoe','Vouvray France','Loire canoe family','Family Park Sorigny'],
      ['Moliets et Maa plage centrale','Moliets plage','Moliets restaurants','Moliets Landes'],
      ['Plage Centrale Moliets','Moliets surf school','Lac de Leon Landes','Moliets ocean'],
      ['Hossegor surf beach','Moliets surf school','Capbreton harbour','Hossegor cafe'],
      ['Lac de Leon Landes','Courant d Huchet Moliets','Reserve naturelle Courant d Huchet','Leon Landes lake'],
      ['Adrenaline Parc Moliets','Moliets accrobranche','Plage des Chenes Lieges Moliets','Moliets mini golf'],
      ['Bayonne old town market','Bayonne Les Halles','Biarritz Grande Plage','Capbreton harbour'],
      ['Plage Centrale Moliets','Plage des Chenes Lieges Moliets','Moliets surf','Moliets sunset'],
      ['Le Tholonet Sainte Victoire','Montagne Sainte Victoire','Le Tholonet Provence','Aix en Provence countryside'],
      ['Aix en Provence market','Cours Mirabeau Aix','Aix calissons','Aix en Provence old town'],
      ['Sainte Victoire Roques Hautes','Montagne Sainte Victoire','Roques Hautes Provence','Musee du Calisson'],
      ['Cassis Calanques','La Ciotat beach','Cote Bleue beach','Cassis harbour'],
      ['Aix en Provence cafe','Boulangerie Le Tholonet','Aix terrace restaurant','Aix ice cream'],
      ['Gordes Luberon','Roussillon ochre trail','Luberon village Provence','Aix market'],
      ['Aix en Provence Cours Mirabeau','Sainte Victoire sunset','Le Tholonet restaurant','Provence evening'],
      ['Beaune old town','Dijon France','Langres France','family hotel Beaune'],
      ['France autoroute roadtrip','French motorway rest area','Darmstadt pizza','roadtrip Germany France']

    function fallbackDayBody(item){
      const placeText = item.place === 'Tours' ? 'Tours funktioniert für euch am besten über Loire, kurze Wege und klare Pausen. Kultur ist hier optional; der Fluss ist der rote Faden.' : item.place === 'Moliets' ? 'In Moliets entscheidet der Zustand der Kinder und das Wetter stärker als eine feste Liste. Atlantik, See, Wald und Surf geben genug Auswahl, aber die beste Entscheidung ist oft die einfachste.' : item.place === 'Le Tholonet' ? 'In der Provence ist Timing wichtiger als Menge. Früh raus, mittags Schatten oder Pool, abends wieder langsam bewegen.' : 'Dieser Tag ist vor allem Logistik. Je weniger Nebenprogramm, desto besser funktioniert der Reisefluss.';
      return `<p class="detail-lead">${item.focus || item.mood}</p><p>${placeText}</p><h3>So würde ich den Tag lesen</h3><p>Die entspannte Variante ist nicht der schlechtere Plan, sondern der Standard. Die aktive Variante lohnt sich, wenn alle morgens wirklich Energie haben. Die Alternative ist der Sicherheitsanker, wenn Hitze, Müdigkeit oder Fahrzeit gegen euch arbeiten.</p><h3>Entspannt</h3><p>${item.calm}</p><h3>Aktiv</h3><p>${item.active}</p><h3>Alternative</h3><p>${item.fallback}</p><h3>Meine Empfehlung für euch</h3><p>Entscheidet morgens nicht nach Pflichtgefühl, sondern nach Energie. Wenn ihr diskutieren müsst, ist meistens die kleinere Variante richtig. Mit Kindern wird ein guter halber Tag oft wertvoller als ein vollgepackter ganzer Tag.</p>`;
    }
    function verdict(item){
      if(item.type === 'Strand') return 'Sehr passend, solange ihr Strömung, Sonne und Pausen ernst nehmt. Vormittag oder später Nachmittag ist meist angenehmer als Mittag.';
      if(item.type === 'Aktivität') return 'Sehr guter Baustein für 8 und 10 Jahre, weil daraus ein echtes Erlebnis wird.';
      if(item.type === 'Ausflug') return 'Lohnend, wenn ihr ihn schlank haltet: ein klares Ziel, keine zweite große Station, gute Rückkehrzeit.';
      return 'Guter Baustein, wenn ihr ihn als flexible Option versteht und nicht als Pflichttermin.';
    }

    function render(title, eyebrow, body, side, imageQueries){
      const chatBox = chatGPTBoxMarkup();
      root.innerHTML = `${galleryMarkup(imageQueries,title)}<p class="section-kicker">${eyebrow}</p><h1>${title}</h1><div class="detail-grid"><section>${body}</section><aside>${side}<div class="side-card"><h3>Vor Ort prüfen</h3><ul><li>Öffnungszeiten</li><li>Parken</li><li>Reservierung</li><li>Hitze / Wetter</li></ul></div></aside></div>${chatBox}`;
      document.title = `${title} · France 2026`;
      currentPrompt = buildChatGPTPrompt(title, eyebrow, body, side);
      setupChatGPTBox();
    }

    function chatGPTBoxMarkup(){
      return `<section class="ask-chatgpt"><h3>Diese Seite in ChatGPT fragen</h3><p>Kopiert einen vorbereiteten Prompt mit dem Kontext dieser Detailseite. Danach ChatGPT öffnen, einfügen und konkret nachfragen.</p><div class="ask-actions"><button type="button" data-copy-prompt>Prompt kopieren</button><button type="button" data-preview-prompt>Prompt anzeigen</button><a href="https://chatgpt.com/" target="_blank" rel="noopener">ChatGPT öffnen ↗</a></div><p class="copy-status" data-copy-status aria-live="polite"></p><textarea class="prompt-preview" data-prompt-preview readonly></textarea></section>`;
    }
    function buildChatGPTPrompt(title, eyebrow, bodyHtml, sideHtml){
      const context = [textFromHtml(bodyHtml), textFromHtml(sideHtml)].filter(Boolean).join('\n\n');
      return `Du bist mein pragmatischer Reiseassistent für unseren Familienurlaub in Frankreich 2026.\n\nKontext der aktuellen Detailseite:\nTitel: ${title}\nEinordnung: ${eyebrow}\n\n${context}\n\nRahmenbedingungen:\n- Familie mit zwei Kindern, 8 und 10 Jahre.\n- Wir mögen Baden, Tiere, Ausflüge, Essen/Kaffee und aktive, aber nicht überladene Tage.\n- Im Zweifel lieber weniger Programm, mehr Pausen, Hitze beachten.\n- Antworte konkret, knapp und praktisch.\n- Nenne klare Optionen, Vor- und Nachteile, Timing, Pack-/Reservierungshinweise.\n- Wenn es um Öffnungszeiten, Preise, Buchungen oder Wetter geht, weise darauf hin, dass ich es aktuell prüfen soll.\n\nMeine Frage dazu:`;
    }
    function textFromHtml(html){
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return div.textContent.replace(/\s+/g,' ').trim();
    }
    function setupChatGPTBox(){
      const copyButton = root.querySelector('[data-copy-prompt]');
      const previewButton = root.querySelector('[data-preview-prompt]');
      const preview = root.querySelector('[data-prompt-preview]');
      const status = root.querySelector('[data-copy-status]');
      if(copyButton){
        copyButton.addEventListener('click', async () => {
          try {
            await copyText(currentPrompt);
            status.textContent = 'Prompt kopiert. Jetzt ChatGPT öffnen und einfügen.';
          } catch(e) {
            preview.value = currentPrompt;
            preview.classList.add('open');
            preview.focus();
            preview.select();
            status.textContent = 'Automatisches Kopieren ging nicht. Prompt unten manuell kopieren.';
          }
        });
      }
      if(previewButton && preview){
        previewButton.addEventListener('click', () => {
          preview.value = currentPrompt;
          preview.classList.toggle('open');
          if(preview.classList.contains('open')) preview.focus();
        });
      }
    }
    async function copyText(text){
      if(navigator.clipboard && window.isSecureContext){
        await navigator.clipboard.writeText(text);
        return;
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      const ok = document.execCommand('copy');
      textarea.remove();
      if(!ok) throw new Error('copy failed');
    }

    function galleryMarkup(input,title){
      const queries = normalizeGalleryQueries(input,title);
      return `<div class="image-gallery" aria-label="Bildergalerie">${queries.map((q,i)=>`<figure class="gallery-card"><a href="${imageSourceUrl(q)}" target="_blank" rel="noopener" title="Herkunftsseiten zu ${escapeHtml(q)} öffnen"><img src="${galleryImageUrl(q,i)}" alt="${escapeHtml(q)}" loading="lazy" onerror="this.onerror=null;this.src='${fallbackUrl(title,i)}'"><figcaption>${escapeHtml(q)} · Herkunft öffnen ↗</figcaption></a></figure>`).join('')}</div>`;
    }
    function normalizeGalleryQueries(input,title){
      let arr = Array.isArray(input) ? input : [input];
      arr = arr.flat().filter(Boolean).map(x => String(x).trim()).filter(Boolean);
      arr = [...new Set(arr)];
      const extras = [`${title} France`,`${title} travel`,`${title} tourism`,`${title} landscape`];
      for(const e of extras){ if(arr.length >= 4) break; if(!arr.includes(e)) arr.push(e); }
      return arr.slice(0,4);
    }
    function galleryImageUrl(query,index){ return `https://tse${(index%4)+1}.mm.bing.net/th?q=${encodeURIComponent(String(query).trim())}&w=760&h=520&c=7&rs=1&p=0&o=5&pid=1.7`; }
    function imageSourceUrl(query){ return `https://www.bing.com/images/search?q=${encodeURIComponent(query)}`; }
    function fallbackUrl(title,index){ return `https://picsum.photos/seed/${encodeURIComponent(title+'-'+index)}/760/520`; }
    function escapeHtml(value){ return String(value).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

    function imageQueriesForDestination(item){
      if(item.id === 'tours') return ['Tours Loire old town','Tours France market','Guinguette de Tours','Loire river Tours'];
      if(item.id === 'moliets') return ['Moliets et Maa plage centrale','Plage Centrale Moliets','Moliets surf','Moliets Landes'];
      if(item.id === 'tholonet') return ['Le Tholonet Sainte Victoire','Montagne Sainte Victoire','Aix en Provence countryside','Provence Le Tholonet'];
      return [item.title,...(item.links||[]).map(l=>l.query)];
    }
    function imageQueriesForPoi(item){
      const q = `${item.name} ${item.query || ''}`.toLowerCase();
      let base;
      if(q.includes('chenonceau')) base = ['Chateau de Chenonceau','Chenonceau Loire','Castle Chenonceau'];
      else if(q.includes('amboise')) base = ['Amboise France castle','Amboise Loire','Chateau Amboise'];
      else if(q.includes('courant')) base = ['Courant d Huchet Moliets','Reserve naturelle Courant d Huchet','Courant d Huchet Landes'];
      else if(q.includes('lac de')) base = ['Lac de Leon Landes','Leon Landes lake','Lac de Leon beach'];
      else if(q.includes('bayonne')) base = ['Bayonne old town market','Bayonne Les Halles','Bayonne France'];
      else if(q.includes('hossegor')) base = ['Hossegor beach surf','Hossegor cafe','Soorts Hossegor'];
      else if(q.includes('capbreton')) base = ['Capbreton harbour','Capbreton port','Capbreton France'];
      else if(q.includes('sainte')) base = ['Montagne Sainte Victoire Provence','Sainte Victoire Roques Hautes','Le Tholonet Sainte Victoire'];
      else if(q.includes('aix')) base = ['Aix en Provence market','Cours Mirabeau Aix','Aix en Provence old town'];
      else if(q.includes('cassis')) base = ['Cassis Calanques','Cassis harbour','Calanques Cassis'];
      else if(q.includes('ciotat')) base = ['La Ciotat beach','La Ciotat France','La Ciotat harbour'];
      else if(q.includes('moliets') || q.includes('plage') || q.includes('surf')) base = ['Moliets et Maa plage','Plage Centrale Moliets','Moliets surf'];
      else if(q.includes('vouvray')) base = ['Vouvray Loire canoe','Vouvray France','Loire canoe family'];
      else base = [item.name,item.query,`${item.name} ${item.place || ''}`];
      return [...base,...((item.links||[]).map(l=>l.query))];
    }

    if(type === 'destination'){
      const item = data.destinations.find(x => x.id === id);
      render(item.title,'Stationsguide',`<p class="detail-lead">${item.deep || item.story}</p><h3>Warum das für euch passt</h3><p>${item.familyAngle || item.story}</p><h3>Highlights</h3>${list(item.highlights)}<h3>Konkrete Tipps</h3>${list(item.tips)}`,links(item.links),imageQueriesForDestination(item));
    } else if(type === 'day'){
      const item = data.days[Number(id)];
      const curated = dayLinks[Number(id)] || [];
      const guide = dayGuides[Number(id)];
      const imageQueries = dayImageQueries[Number(id)] || [`${item.title} ${item.place}`,...curated.map(l=>l.query)];
      if(guide){
        render(item.title,`${item.date} · ${item.place}`,`<div class="detail-lead">${paragraphList(guide.intro)}</div><h3>So würde ich den Tag aufbauen</h3>${list(guide.plan)}<h3>Meine Empfehlung für euch</h3><p>${guide.recommendation}</p><h3>Praktische Hinweise</h3>${list(guide.logistics)}${guide.sourceNote ? `<p class="source-note">${guide.sourceNote}</p>` : ''}`,links(guide.links || curated),imageQueries);
      } else {
        render(item.title,`${item.date} · ${item.place}`,fallbackDayBody(item),links(curated),imageQueries);
      }
    } else if(type === 'poi'){
      const item = data.pois[Number(id)];
      render(item.name,`${item.type} · ${item.place}`,`<p class="detail-lead">${item.text}</p><h3>Warum lohnt sich das?</h3><p>${item.why || item.text}</p><h3>Praktische Tipps</h3>${list(item.tips)}<h3>Familienfazit</h3><p>${verdict(item)}</p>`,`<a class="maps-button" href="${mapsLink(item.query)}" target="_blank" rel="noopener">In Google Maps öffnen</a>${links(item.links)}`,imageQueriesForPoi(item));
    } else if(type === 'food'){
      const item = data.food[Number(id)];
      render(item.title,`Essen · ${item.place}`,`<p class="detail-lead">${item.text}</p><h3>Warum passt das?</h3><p>${item.why || item.text}</p><h3>Tipps</h3>${list(item.tips)}<h3>Familienfazit</h3><p>Für euch zählt hier weniger maximale Kulinarik, sondern gute Stimmung, kurze Wege und planbare Kinderenergie.</p>`, item.query ? `<a class="maps-button" href="${mapsLink(item.query)}" target="_blank" rel="noopener">In Google Maps suchen</a>` : '', [item.query || item.title,`${item.place} restaurant`,`${item.place} terrace`,`${item.place} food`]);
    } else {
      root.innerHTML = '<h1>Nichts gefunden</h1><p>Zurück zur Übersicht.</p>';
    }
  </script>
</body>
</html>
