<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>France 2026 Detail</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{background:#fff8ea}.detail-page{padding:32px 0 80px}.back-link{display:inline-block;margin:24px 0;font-weight:900;color:#176b87}.detail-card{background:rgba(255,255,255,.86);border:1px solid rgba(23,32,42,.12);border-radius:28px;box-shadow:0 24px 70px rgba(23,32,42,.13);padding:32px}.detail-grid{display:grid;grid-template-columns:minmax(0,1.45fr)340px;gap:28px;align-items:start}.detail-lead{font-size:1.18rem}.detail-card p,.detail-card li,.side-card p{color:#657286}.side-card{background:rgba(255,255,255,.72);border:1px solid rgba(23,32,42,.12);border-radius:22px;padding:20px;margin-bottom:16px}.side-card a{display:block;color:#176b87;font-weight:900;padding:8px 0;border-bottom:1px solid rgba(23,32,42,.08)}.maps-button{display:inline-flex;width:100%;align-items:center;justify-content:center;min-height:46px;border-radius:999px;background:#17202a;color:white;font-weight:900;margin-bottom:16px}.source-note{font-size:.9rem;color:#657286;margin-top:28px}.image-hero{margin:0 0 28px;border-radius:24px;overflow:hidden;background:linear-gradient(135deg,#dff3ee,#f7dfb9);border:1px solid rgba(23,32,42,.10)}.image-hero img{display:block;width:100%;height:clamp(240px,38vw,440px);object-fit:cover}.image-caption{font-size:.78rem;color:#657286;padding:10px 14px;background:rgba(255,255,255,.72)}@media(max-width:900px){.detail-grid{grid-template-columns:1fr}.detail-card{padding:22px}}
  </style>
</head>
<body>
  <main class="container detail-page">
    <a class="back-link" href="index.html">← Zur Übersicht</a>
    <article id="detailRoot" class="detail-card"><p>Lade Detailseite...</p></article>
  </main>
  <script src="data.js"></script>
  <script>
    const data = window.FRANCE2026;
    const params = new URLSearchParams(location.search);
    const type = params.get('type');
    const id = params.get('id');
    const root = document.querySelector('#detailRoot');
    const mapsLink = query => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    const links = arr => !arr || !arr.length ? '' : `<div class="side-card"><h3>Links</h3>${arr.map(l => `<a href="${mapsLink(l.query)}" target="_blank" rel="noopener">${l.label}</a>`).join('')}</div>`;
    const list = arr => `<ul>${(arr||[]).map(x => `<li>${x}</li>`).join('')}</ul>`;
    const paragraphList = arr => (arr||[]).map(x => `<p>${x}</p>`).join('');
    const dayLinks = [
      [{label:'Tours Loireufer',query:'Tours Loire river walk'},{label:'Guinguette de Tours',query:'Guinguette de Tours sur Loire'},{label:'Supermarkt Nähe Unterkunft',query:'supermarket Tours France'}],
      [{label:'Les Halles de Tours',query:'Les Halles de Tours market'},{label:'Loire à Vélo Tours',query:'Loire a Velo Tours bike rental'},{label:'Guinguette de Tours',query:'Guinguette de Tours sur Loire'},{label:'Aquarium de Touraine',query:'Aquarium de Touraine'}],
      [{label:'Kanu Vouvray',query:'canoe Vouvray Tours Loire'},{label:'Vouvray Loireufer',query:'Vouvray Loire river'},{label:'Family Park Sorigny',query:'Family Park Sorigny'}],
      [{label:'Plage Centrale Moliets',query:'Plage Centrale Moliets et Maa'},{label:'Restaurants Moliets Plage',query:'restaurants Moliets Plage'},{label:'Supermarkt Moliets',query:'supermarket Moliets et Maa'}],
      [{label:'Plage Centrale',query:'Plage Centrale Moliets et Maa'},{label:'Surf Schools Moliets',query:'surf school Moliets et Maa kids'},{label:'Lac de Léon',query:'Lac de Leon Landes'}],
      [{label:'Surf Schools Moliets',query:'surf school Moliets et Maa kids'},{label:'Hossegor Cafés',query:'Hossegor cafes coffee'},{label:'Capbreton Hafen',query:'Capbreton port restaurants'}],
      [{label:'Lac de Léon',query:'Lac de Leon Landes'},{label:'Courant d’Huchet',query:"Courant d'Huchet Moliets"},{label:'Réserve Naturelle du Courant d’Huchet',query:"Reserve naturelle Courant d'Huchet"}],
      [{label:'Adrenaline Parc',query:'Adrenaline Parc Moliets'},{label:'Minigolf Moliets',query:'mini golf Moliets et Maa'},{label:'Plage des Chênes-Lièges',query:'Plage des Chenes Lieges Moliets'}],
      [{label:'Bayonne Markthalle',query:'Bayonne Les Halles market'},{label:'Bayonne Schokolade',query:'Bayonne chocolate shops'},{label:'Biarritz Grande Plage',query:'Biarritz Grande Plage'},{label:'Capbreton Hafen',query:'Capbreton port'}],
      [{label:'Plage Centrale',query:'Plage Centrale Moliets et Maa'},{label:'Surf Schools Moliets',query:'surf school Moliets et Maa kids'},{label:'Plage des Chênes-Lièges',query:'Plage des Chenes Lieges Moliets'}],
      [{label:'Le Tholonet',query:'Le Tholonet France'},{label:'Sainte-Victoire Aussicht',query:'Montagne Sainte Victoire Le Tholonet viewpoint'},{label:'Supermarkt Le Tholonet',query:'supermarket Le Tholonet'}],
      [{label:'Aix Markt',query:'Aix en Provence market Cours Mirabeau'},{label:'Cours Mirabeau',query:'Cours Mirabeau Aix en Provence'},{label:'Calissons Aix',query:'calissons Aix en Provence'}],
      [{label:'Roques Hautes',query:'Roques Hautes Sainte Victoire'},{label:'Sainte-Victoire',query:'Montagne Sainte Victoire Le Tholonet'},{label:'Musée du Calisson',query:'Musee du Calisson Aix en Provence'}],
      [{label:'La Ciotat Strand',query:'La Ciotat beach family'},{label:'Cassis Calanques Bootstour',query:'Cassis Calanques boat tour'},{label:'Côte Bleue Strand',query:'Cote Bleue beach family'}],
      [{label:'Bäckerei Le Tholonet',query:'boulangerie Le Tholonet'},{label:'Aix Abendessen Terrasse',query:'Aix en Provence restaurant terrace family'},{label:'Aix Eis',query:'ice cream Aix en Provence'}],
      [{label:'Luberon Dörfer',query:'Luberon villages family day trip'},{label:'Gordes',query:'Gordes France'},{label:'Roussillon Ocker',query:'Roussillon ochre trail family'},{label:'Aix Markt',query:'Aix en Provence market'}],
      [{label:'Aix Lieblingsrunde',query:'Aix en Provence Cours Mirabeau'},{label:'Sainte-Victoire Abendrunde',query:'Montagne Sainte Victoire sunset viewpoint'},{label:'Le Tholonet Restaurants',query:'Le Tholonet restaurant'}],
      [{label:'Beaune Familienhotel',query:'family hotel breakfast parking Beaune'},{label:'Dijon Süd Hotel',query:'family hotel breakfast parking Dijon Sud'},{label:'Langres Hotel',query:'family hotel breakfast parking Langres'}],
      [{label:'Tankstelle nahe Route',query:'petrol station highway France Germany route'},{label:'Rastplatz Frankreich Deutschland',query:'aire autoroute France Germany family stop'},{label:'Darmstadt Pizza',query:'pizza Darmstadt'}]
    ];
    const dayGuides = {
      6: {intro:["Dieser Tag sollte bewusst anders sein als die reinen Atlantiktage. Ihr seid dann schon mehrere Tage in Moliets, wahrscheinlich mit Sand, Wellen, Wind und vielleicht einem ersten Surfkurs. Der Lac de Léon und der Courant d’Huchet bringen einen anderen Rhythmus: ruhigeres Wasser, mehr Grün, mehr Schatten und eine Landschaft, die sich fast wie ein kleiner Gegenentwurf zum offenen Strand anfühlt.","Der Courant d’Huchet ist der natürliche Abfluss des Étang de Léon Richtung Atlantik. Das Spannende daran ist nicht ein einzelner Aussichtspunkt, sondern der Übergang der Landschaften: See, Feuchtgebiet, Wald, Dünen und Mündung liegen sehr nah beieinander. Für euch muss daraus aber keine große Naturkundewanderung werden. Besser ist ein klarer Halbtagesplan: erst Lac de Léon, dann ein gut gewählter Abschnitt am Courant oder eine organisierte Bootsfahrt prüfen. Danach zurück, Pause, eventuell später noch einmal kurz an den Strand.","Mit Kindern ist der See wahrscheinlich der bessere Einstieg als der Flusslauf. Am Lac de Léon habt ihr weniger Wellen, mehr Ruhe und mehr Picknick-Logik. Der Courant ist der besondere Teil für euch Erwachsene: diese Mischung aus Landes-Wald, Wasserlauf und fast tropisch wirkender Vegetation. Gerade nach mehreren Tagen Atlantik fühlt sich das wie ein Ortswechsel an, ohne dass ihr weit fahren müsst."],plan:["Vormittags Lac de Léon: ruhigeres Wasser, Picknick, Schatten suchen.","Danach Courant d’Huchet als Spaziergang oder Bootsfahrt prüfen.","Später Nachmittag frei halten: Pool, Unterkunft oder kurzer Strandabschluss."],recommendation:"Heute nicht wieder Plage Centrale. Genau an diesem Punkt der Reise ist Abwechslung wertvoll. Der See ist für die Kinder entspannter, der Courant für euch landschaftlich interessanter. Verkauft den Tag nicht als lange Wanderung, sondern als Entdeckertour mit Wasser, Schatten und Picknick.",logistics:["Mückenschutz einpacken.","Für Picknick und Wasser selbst sorgen.","Bootstouren und Regeln der Reserve vorher prüfen; private Navigation ist am Courant nicht einfach frei möglich.","Wenn es sehr heiß ist, nur den Vormittag nutzen und nachmittags konsequent Pause machen."],sourceNote:"Recherchenotiz: Der Courant d’Huchet verbindet den Étang de Léon mit dem Atlantik und gehört zur nationalen Naturreserve. Der See und die Reserve sind daher nicht nur Bade-/Spazierziele, sondern ein empfindlicher Naturraum."},
      15: {intro:["Der Luberon ist eine der schönsten Provence-Landschaften: Kalkstein, Dörfer, Ocker, Aussicht, Postkartenfarben. Gleichzeitig ist er im August touristisch, heiß und von Le Tholonet aus kein kleiner Spaziergang. Klassische Ziele wie Gordes und Roussillon liegen eher im nördlichen und westlichen Luberon. Das bedeutet: zusätzliche Autofahrzeit, enge Straßen, Parkplatzthemen und Kinder, die irgendwann nicht mehr zwischen schönem Dorf Nummer eins und schönem Dorf Nummer zwei unterscheiden.","Für euch würde ich den Tag deshalb nicht als große Luberon-Runde planen. Nicht Gordes plus Roussillon plus noch ein Dorf plus Lavendel plus Markt. Das wird mit 8 und 10 Jahren in der Hitze schnell zur Erwachsenenidee. Wenn ihr fahrt, dann früh, maximal ein Hauptziel und ein Bonus. Gordes ist stark für Aussicht und das klassische Provence-Bild. Roussillon ist für Kinder oft greifbarer, weil die Ockerfarben, roten Felsen und Wege visueller sind.","Die wichtigste Entscheidung ist morgens: Habt ihr wirklich Lust auf Auto? Wenn ja, dann kann der Luberon ein sehr schöner Halbtagesausflug sein. Wenn die Motivation mittel ist, ist Aix mit Calissons und anschließend Pool die bessere Entscheidung. Das ist kein Verzicht, sondern gutes Urlaubsmanagement."],plan:["Früh starten, nicht nach einem trägen Vormittag.","Maximal ein Dorf ernsthaft anschauen, optional ein zweites nur kurz.","Nach Mittag zurück Richtung Unterkunft und Pool."],recommendation:"Macht den Luberon nur, wenn ihr morgens wirklich Lust auf Auto habt. Wenn ja: Roussillon ist für Kinder wahrscheinlich greifbarer als Gordes, weil die Ockerfarben etwas Spielerisches haben. Gordes ist schöner als Aussicht, aber weniger kindlich. Wenn die Energie mittel ist: Aix + Calissons + Pool ist die bessere Entscheidung.",logistics:["Parkplätze vorher prüfen.","Nicht zur Mittagshitze durch volle Dörfer laufen.","Picknick nur, wenn Schatten realistisch ist; sonst lieber kurz essen und zurück.","Keine drei Dörfer planen. Das klingt auf der Karte harmlos und fühlt sich vor Ort schnell zäh an."],sourceNote:"Recherchenotiz: Der Luberon ist ein großes Kalkstein-Massiv und Naturparkgebiet; Gordes, Roussillon und Apt liegen nördlich des Massivs. Für euch ist daher Auswahl wichtiger als Vollständigkeit."}
    };
    const dayImageQueries=['Tours Loire','Tours old town Loire','Vouvray canoe Loire','Moliets et Maa plage centrale','Moliets et Maa plage centrale','Hossegor surf beach','Courant d Huchet Moliets','Adrenaline Parc Moliets','Bayonne old town market','Moliets et Maa plage Chenes Lieges','Le Tholonet Sainte Victoire','Aix en Provence market','Sainte Victoire Roques Hautes','Cassis Calanques','Aix en Provence cafe','Gordes Luberon','Sainte Victoire sunset','Beaune old town','France autoroute roadtrip'];
    function fallbackDayBody(item){const placeText=item.place==='Tours'?'Tours funktioniert für euch am besten über Loire, kurze Wege und klare Pausen. Kultur ist hier optional; der Fluss ist der rote Faden.':item.place==='Moliets'?'In Moliets entscheidet der Zustand der Kinder und das Wetter stärker als eine feste Liste. Atlantik, See, Wald und Surf geben genug Auswahl, aber die beste Entscheidung ist oft die einfachste.':item.place==='Le Tholonet'?'In der Provence ist Timing wichtiger als Menge. Früh raus, mittags Schatten oder Pool, abends wieder langsam bewegen.':'Dieser Tag ist vor allem Logistik. Je weniger Nebenprogramm, desto besser funktioniert der Reisefluss.';return `<p class="detail-lead">${item.focus||item.mood}</p><p>${placeText}</p><h3>So würde ich den Tag lesen</h3><p>Die entspannte Variante ist nicht der schlechtere Plan, sondern der Standard. Die aktive Variante lohnt sich, wenn alle morgens wirklich Energie haben. Die Alternative ist der Sicherheitsanker, wenn Hitze, Müdigkeit oder Fahrzeit gegen euch arbeiten.</p><h3>Entspannt</h3><p>${item.calm}</p><h3>Aktiv</h3><p>${item.active}</p><h3>Alternative</h3><p>${item.fallback}</p><h3>Meine Empfehlung für euch</h3><p>Entscheidet morgens nicht nach Pflichtgefühl, sondern nach Energie. Wenn ihr diskutieren müsst, ist meistens die kleinere Variante richtig. Mit Kindern wird ein guter halber Tag oft wertvoller als ein vollgepackter ganzer Tag.</p>`;}
    function verdict(item){if(item.type==='Strand')return'Sehr passend, solange ihr Strömung, Sonne und Pausen ernst nehmt. Vormittag oder später Nachmittag ist meist angenehmer als Mittag.';if(item.type==='Aktivität')return'Sehr guter Baustein für 8 und 10 Jahre, weil daraus ein echtes Erlebnis wird.';if(item.type==='Ausflug')return'Lohnend, wenn ihr ihn schlank haltet: ein klares Ziel, keine zweite große Station, gute Rückkehrzeit.';return'Guter Baustein, wenn ihr ihn als flexible Option versteht und nicht als Pflichttermin.';}
    function render(title,eyebrow,body,side,imageQuery){root.innerHTML=`<figure class="image-hero"><img id="detailImage" alt="${title}" loading="lazy"><figcaption id="imageCredit" class="image-caption">Lade konkretes Bild …</figcaption></figure><p class="section-kicker">${eyebrow}</p><h1>${title}</h1><div class="detail-grid"><section>${body}</section><aside>${side}<div class="side-card"><h3>Vor Ort prüfen</h3><ul><li>Öffnungszeiten</li><li>Parken</li><li>Reservierung</li><li>Hitze / Wetter</li></ul></div></aside></div>`;document.title=`${title} · France 2026`;loadDirectImage(imageQuery||title,title);}
    function loadDirectImage(query,title){const img=document.querySelector('#detailImage');const credit=document.querySelector('#imageCredit');const exact=String(query||title).trim();img.src=`https://tse1.mm.bing.net/th?q=${encodeURIComponent(exact)}&w=1600&h=900&c=7&rs=1&p=0&o=5&pid=1.7`;img.onerror=()=>{img.src=`https://picsum.photos/seed/${encodeURIComponent(title)}/1600/900`;credit.textContent='Fallback-Bild geladen.'};credit.textContent=`Direktes externes Bild · Suchbegriff: ${exact}`;}
    function imageQueryForDestination(item){if(item.id==='tours')return'Tours Loire old town';if(item.id==='moliets')return'Moliets et Maa plage centrale';if(item.id==='tholonet')return'Le Tholonet Sainte Victoire';return item.title;}
    function imageQueryForPoi(item){const q=`${item.name} ${item.query||''}`.toLowerCase();if(q.includes('chenonceau'))return'Chateau de Chenonceau';if(q.includes('amboise'))return'Amboise France castle';if(q.includes('courant'))return'Courant d Huchet Moliets';if(q.includes('lac de'))return'Lac de Leon Landes';if(q.includes('bayonne'))return'Bayonne old town market';if(q.includes('hossegor'))return'Hossegor beach surf';if(q.includes('capbreton'))return'Capbreton harbour';if(q.includes('sainte'))return'Montagne Sainte Victoire Provence';if(q.includes('aix'))return'Aix en Provence market';if(q.includes('cassis'))return'Cassis Calanques';if(q.includes('ciotat'))return'La Ciotat beach';if(q.includes('moliets')||q.includes('plage')||q.includes('surf'))return'Moliets et Maa plage';if(q.includes('vouvray'))return'Vouvray Loire canoe';return `${item.name} ${item.place||''}`;}
    if(type==='destination'){const item=data.destinations.find(x=>x.id===id);render(item.title,'Stationsguide',`<p class="detail-lead">${item.deep||item.story}</p><h3>Warum das für euch passt</h3><p>${item.familyAngle||item.story}</p><h3>Highlights</h3>${list(item.highlights)}<h3>Konkrete Tipps</h3>${list(item.tips)}`,links(item.links),imageQueryForDestination(item));}
    else if(type==='day'){const item=data.days[Number(id)];const curated=dayLinks[Number(id)]||[];const guide=dayGuides[Number(id)];const imageQuery=dayImageQueries[Number(id)]||`${item.title} ${item.place}`;if(guide){render(item.title,`${item.date} · ${item.place}`,`<div class="detail-lead">${paragraphList(guide.intro)}</div><h3>So würde ich den Tag aufbauen</h3>${list(guide.plan)}<h3>Meine Empfehlung für euch</h3><p>${guide.recommendation}</p><h3>Praktische Hinweise</h3>${list(guide.logistics)}${guide.sourceNote?`<p class="source-note">${guide.sourceNote}</p>`:''}`,links(guide.links||curated),imageQuery);}else{render(item.title,`${item.date} · ${item.place}`,fallbackDayBody(item),links(curated),imageQuery);}}
    else if(type==='poi'){const item=data.pois[Number(id)];render(item.name,`${item.type} · ${item.place}`,`<p class="detail-lead">${item.text}</p><h3>Warum lohnt sich das?</h3><p>${item.why||item.text}</p><h3>Praktische Tipps</h3>${list(item.tips)}<h3>Familienfazit</h3><p>${verdict(item)}</p>`,`<a class="maps-button" href="${mapsLink(item.query)}" target="_blank" rel="noopener">In Google Maps öffnen</a>${links(item.links)}`,imageQueryForPoi(item));}
    else if(type==='food'){const item=data.food[Number(id)];render(item.title,`Essen · ${item.place}`,`<p class="detail-lead">${item.text}</p><h3>Warum passt das?</h3><p>${item.why||item.text}</p><h3>Tipps</h3>${list(item.tips)}<h3>Familienfazit</h3><p>Für euch zählt hier weniger maximale Kulinarik, sondern gute Stimmung, kurze Wege und planbare Kinderenergie.</p>`,item.query?`<a class="maps-button" href="${mapsLink(item.query)}" target="_blank" rel="noopener">In Google Maps suchen</a>`:'',item.query||`${item.title} ${item.place}`);}
    else{root.innerHTML='<h1>Nichts gefunden</h1><p>Zurück zur Übersicht.</p>';}
  </script>
</body>
</html>
