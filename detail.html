<html lang="de">
<head>

  <title>France 2026 Detail</title>
  <link rel="stylesheet" href="styles.css?v=20260718-1">
  <style>
    body{background:#fff8ea}.detail-page{padding:32px 0 80px}.back-link{display:inline-block;margin:24px 0;font-weight:900;color:#176b87}.detail-card{background:rgba(255,255,255,.88);border:1px solid rgba(23,32,42,.12);border-radius:28px;box-shadow:0 24px 70px rgba(23,32,42,.13);padding:32px}.detail-grid{display:grid;grid-template-columns:minmax(0,1.45fr)340px;gap:28px;align-items:start}.detail-lead{font-size:1.13rem;color:#17202a}.detail-card p,.detail-card li,.side-card p{color:#657286}.detail-card h3{margin-top:30px;margin-bottom:10px}.guide-section{padding:22px 0;border-top:1px solid rgba(23,32,42,.10)}.guide-section:first-of-type{border-top:0}.guide-section ul{padding-left:1.2rem}.decision-table{display:grid;gap:10px;margin:16px 0}.decision-row{display:grid;grid-template-columns:170px minmax(0,1fr);gap:12px;padding:12px 14px;border-radius:18px;background:rgba(23,32,42,.055)}.decision-row strong{color:#17202a}.side-card{background:rgba(255,255,255,.74);border:1px solid rgba(23,32,42,.12);border-radius:22px;padding:20px;margin-bottom:16px}.side-card a{display:block;color:#176b87;font-weight:900;padding:8px 0;border-bottom:1px solid rgba(23,32,42,.08)}.maps-button{display:inline-flex;width:100%;align-items:center;justify-content:center;min-height:46px;border-radius:999px;background:#17202a;color:white;font-weight:900;margin-bottom:16px}.source-note{font-size:.9rem;color:#657286;margin-top:22px}.image-gallery{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:0 0 28px}.gallery-card{margin:0;border-radius:18px;overflow:hidden;background:rgba(255,255,255,.82);border:1px solid rgba(23,32,42,.10);box-shadow:0 10px 30px rgba(23,32,42,.10)}.gallery-card a{display:block;color:inherit;text-decoration:none}.gallery-card img{display:block;width:100%;height:170px;object-fit:cover;background:#f3ead6}.gallery-card figcaption{font-size:.72rem;line-height:1.25;color:#657286;padding:8px 10px;background:rgba(255,255,255,.86)}.gallery-card:hover{transform:translateY(-1px);box-shadow:0 16px 36px rgba(23,32,42,.14)}.ask-chatgpt{margin-top:34px;border-radius:24px;border:1px solid rgba(23,32,42,.14);background:linear-gradient(135deg,rgba(23,107,135,.10),rgba(246,189,96,.18));padding:22px}.ask-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.ask-actions button,.ask-actions a{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border-radius:999px;padding:0 16px;border:1px solid rgba(23,32,42,.16);font-weight:900;cursor:pointer}.ask-actions button{background:#17202a;color:white}.ask-actions a{background:rgba(255,255,255,.72);color:#176b87}.copy-status{margin-top:10px;font-size:.9rem;font-weight:800;color:#5f8d4e;min-height:1.2em}.prompt-preview{display:none;margin-top:14px;width:100%;min-height:180px;border:1px solid rgba(23,32,42,.16);border-radius:18px;padding:12px;background:rgba(255,255,255,.78);color:#17202a;font:inherit}.prompt-preview.open{display:block}@media(max-width:900px){.detail-grid{grid-template-columns:1fr}.detail-card{padding:22px}.image-gallery{grid-template-columns:repeat(2,minmax(0,1fr))}.gallery-card img{height:150px}.decision-row{grid-template-columns:1fr}}@media(max-width:520px){.image-gallery{grid-template-columns:1fr}.gallery-card img{height:190px}.ask-actions{display:grid}.ask-actions a,.ask-actions button{width:100%}}
  </style>
</head>
<body>
  <main class="container detail-page">
    <a class="back-link" href="index.html">← Zur Übersicht</a>
    <article id="detailRoot" class="detail-card"><p>Lade Detailseite...</p></article>
  </main>
  <script src="data.js?v=20260718-1"></script>
  <script>
    const data = window.FRANCE2026;
    const params = new URLSearchParams(location.search);
    const type = params.get('type');
    const id = params.get('id');
    const root = document.querySelector('#detailRoot');
    let currentPrompt = '';

    const mapsLink = query => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    const imageSourceUrl = query => `https://www.bing.com/images/search?q=${encodeURIComponent(query)}`;
    const galleryImageUrl = (query,index) => `https://tse${(index%4)+1}.mm.bing.net/th?q=${encodeURIComponent(String(query).trim())}&w=760&h=520&c=7&rs=1&p=0&o=5&pid=1.7`;
    const fallbackUrl = (title,index) => `https://picsum.photos/seed/${encodeURIComponent(title+'-'+index)}/760/520`;
    const escapeHtml = value => String(value).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const list = arr => `<ul>${(arr||[]).map(x => `<li>${x}</li>`).join('')}</ul>`;
    const paragraphs = arr => (arr||[]).map(x => `<p>${x}</p>`).join('');

    const dayGuides = {
      2: {
        imageQueries: ['Vouvray Loire canoe','Tours Canoe Vouvray','Family Park Sorigny','Vouvray Loire river'],
        links: [
          {label:'Tours & Canoë Basis Vouvray', query:'Tours Canoe La Frilliere Vouvray'},
          {label:'Familien-Kanutour Sablière–Vouvray', query:'Balade canoe en famille Sabliere Vouvray'},
          {label:'Family Park Sorigny', query:'Family Park Sorigny'},
          {label:'Vouvray Loireufer', query:'Vouvray Loire river'}
        ],
        intro: [
          `Dieser Tag darf nicht nur „irgendwas mit Loire“ heißen. Eigentlich stehen hier zwei sehr unterschiedliche Programme zur Wahl: eine echte Wasseraktivität ab Vouvray oder ein klarer Kinder-Action-Joker im Family Park Sorigny. Beides kann gut sein, aber es löst unterschiedliche Urlaubssituationen.`,
          `Die Kanutour ist der bessere Plan, wenn ihr nach dem Ankommen in Tours ein echtes gemeinsames Erlebnis wollt: draußen, ruhig, auf dem Wasser, ohne dass es ein ganzer Ausflugstag wird. Der kurze Abschnitt Sablière–Vouvray ist gerade deshalb interessant, weil er als Einstiegsstrecke funktioniert und nicht nach Expedition klingt.`,
          `Family Park ist dagegen keine Loire-Romantik, sondern ein pragmatisches Ventil: Wenn die Kinder nach Stadt, Fahrt und Erwachsenenprogramm etwas Eigenes brauchen, ist das wahrscheinlich der bessere Joker. Dann geht es nicht um Sehenswürdigkeit, sondern um Energie raus, Fahrgeschäfte, Wasser-/Sommergefühl und klare Kinderpriorität.`
        ],
        sections: [
          {
            title:'Option 1: Familien-Kanutour ab Vouvray',
            body:`Der konkrete Kern ist die Strecke Sablière–Vouvray mit Tours & Canoë. Das ist laut Anbieter der kleinste Parcours und als Einstieg für Kinder und Erwachsene gedacht. Der Vorteil für euch: Ihr macht nicht „Loire anschauen“, sondern seid wirklich auf dem Fluss. Dadurch wird die Loire für die Kinder greifbar: Strömung, Sandbänke, Ufer, Vögel, Brücken, Paddelrhythmus.`,
            bullets:[
              'Dauer grob als Halbtagesbaustein denken, nicht als ganzer Tag.',
              'Der aktive Teil ist überschaubar; danach reicht ein einfaches Essen oder Eis.',
              'Nicht mit Schloss, langer Altstadt und großem Abendessen kombinieren.',
              'Vorab klären: Uhrzeit, Reservierung, Rücktransport, Schwimmwesten, Wetter und Gewitterrisiko.'
            ]
          },
          {
            title:'So würde ich den Kanu-Tag konkret bauen',
            body:`Morgens nicht trödeln, aber auch nicht in Stress kippen. Frühstück, Wasserflaschen, Sonnencreme, Wechselkleidung. Dann nach Vouvray zur Basis. Nach der Tour kein zweites großes Programm dranhängen. Besser: kurzer Snack, Loireufer, zurück nach Tours, Pause. Abends Guinguette oder Picknick, wenn noch Stimmung da ist.`,
            bullets:[
              '09:00–10:00: Frühstück, Sachen packen, Wetter prüfen.',
              'Vormittag oder früher Nachmittag: Kanutour ab Vouvray.',
              'Direkt danach: Snack, trockene Kleidung, keine Diskussion über „noch schnell ein Schloss“.',
              'Später: Eis, Loireufer oder Guinguette als weicher Abschluss.'
            ]
          },
          {
            title:'Option 2: Family Park Sorigny',
            body:`Family Park ist die richtige Entscheidung, wenn ihr merkt: Die Kinder brauchen heute nicht „schön“, sondern „meins“. Der Park liegt südlich von Tours in Sorigny und ist ein klassischer Freizeitpark-Baustein mit Fahrgeschäften und Kinderattraktionen. Für eure Reise ist das kein kultureller Höhepunkt, aber ein sehr nützlicher Ausgleichstag.`,
            bullets:[
              'Gut bei: müden Kindern nach Stadtprogramm, Wunsch nach Action, heißem Tag mit Wasser-/Sommerattraktionen.',
              'Weniger gut bei: sehr voller Mittagshitze, Eltern ohne Nerv für Freizeitparklautstärke, nur halb motivierten Kindern.',
              'Als Halbtagesprogramm planen; nicht danach noch Altstadt erzwingen.',
              'Öffnungszeiten, Attraktionen, Größenregeln und Online-Tickets vorher prüfen.'
            ]
          },
          {
            title:'Entscheidung am Morgen',
            body:`Die Entscheidung sollte nicht heißen „Was ist objektiv besser?“, sondern „Welche Energie haben wir heute?“. Wenn ihr am Morgen Lust auf Natur und gemeinsames Erlebnis habt: Kanu. Wenn ihr merkt, dass die Kinder einen eigenen Actiontag brauchen: Family Park. Wenn alle nur so mittel drauf sind: Vouvray ohne Kanu, Loireufer, Eis und früher Schluss.`,
            custom:`<div class="decision-table"><div class="decision-row"><strong>Kinder wollen Action</strong><span>Family Park. Das ist dann kein Notnagel, sondern die passende Wahl.</span></div><div class="decision-row"><strong>Alle wollen draußen sein</strong><span>Kanu. Mehr gemeinsames Erlebnis, weniger Reizüberflutung.</span></div><div class="decision-row"><strong>Hitze / Gewitterrisiko</strong><span>Sehr vorsichtig entscheiden. Wasser klingt gut, aber Sonne und Wetter sind auf dem Fluss nicht egal.</span></div><div class="decision-row"><strong>Eltern sind müde</strong><span>Die kleine Variante nehmen: Vouvray, Loireufer, Picknick. Kein Pflichtprogramm.</span></div></div>`
          },
          {
            title:'Packen und vorher prüfen',
            body:`Das ist der Teil, der entscheidet, ob der Tag entspannt oder nervig wird. Bei Kanu nicht improvisieren: geschlossene Wasser-/Badeschuhe, Wechselkleidung, Handtuch, Brillenband, Sonnencreme, Wasser, kleine wasserdichte Tasche. Bei Family Park eher: Kappen, Wasser, Snacks, Sonnencreme, ggf. Badesachen, und vorher klären, ob alle Kinder bei den gewünschten Attraktionen mitmachen dürfen.`,
            bullets:[
              'Kanu: Handy wasserdicht, Wechselkleidung nicht im Auto ganz unten vergraben.',
              'Kanu: keine schweren Rucksäcke, kein loses Zeug, das nass werden darf.',
              'Family Park: Tickets/Öffnungszeiten prüfen, Mittagshitze vermeiden, klare Pausen setzen.',
              'Für beide Varianten: danach bewusst leeren Nachmittag oder sehr einfachen Abend.'
            ]
          }
        ],
        recommendation:`Meine klare Empfehlung: Wenn Wetter und Stimmung passen, würde ich Kanu ab Vouvray priorisieren. Das ist der stärkere Urlaubsmoment und passt besser zum Loire-Block. Family Park würde ich als echten Plan B behalten, nicht als zweite Aktivität am selben Tag. Wenn die Kinder morgens sehr deutlich Action wollen, dann kippt die Entscheidung Richtung Family Park – aber dann ohne schlechtes Gewissen.`,
        logistics:['Kanu vorher reservieren oder mindestens Verfügbarkeit prüfen.','Wetter und Gewitterrisiko ernst nehmen.','Nach dem Wasser keine zweite große Sehenswürdigkeit planen.','Bei Family Park Größen-/Altersregeln und Öffnungszeiten prüfen.'],
        sourceNote:'Recherchenotiz: Der Guide basiert auf der offiziellen Tours-Tourismus-Seite zur Familien-Kanutour Sablière–Vouvray, dem Anbieter Tours & Canoë und den offiziellen Family-Park-Informationen für Sorigny.'
      },
      6: {
        imageQueries:['Lac de Leon Landes','Courant d Huchet Moliets','Reserve naturelle Courant d Huchet','Leon Landes lake'],
        links:[{label:'Lac de Léon',query:'Lac de Leon Landes'},{label:'Courant d’Huchet',query:"Courant d'Huchet Moliets"},{label:'Réserve Naturelle',query:"Reserve naturelle Courant d'Huchet"}],
        intro:[`Dieser Tag sollte bewusst anders sein als die reinen Atlantiktage. Lac de Léon und Courant d’Huchet bringen ruhigeres Wasser, mehr Grün, mehr Schatten und einen echten Gegenpol zu Sand und Wellen.`,`Mit Kindern ist der See wahrscheinlich der bessere Einstieg. Der Courant ist der landschaftlich besondere Teil: Wasserlauf, Feuchtgebiet, Wald, Dünen und Mündung liegen nah beieinander.`],
        sections:[{title:'Sinn des Tages',body:'Nicht wieder Plage Centrale, sondern Abwechslung: See, Picknick, Schatten und Natur. Der Tag soll nicht zur langen Wanderung werden, sondern ein Halbtagswechsel vom Atlantikmodus sein.',bullets:['Vormittags Lac de Léon.','Danach Courant d’Huchet als Spaziergang oder Bootsfahrt prüfen.','Nachmittags frei halten: Pool oder kurzer Strandabschluss.']}],
        recommendation:'Heute nicht wieder den Hauptstrand wählen. See und Courant bringen den besseren Kontrast.',
        logistics:['Mückenschutz einpacken.','Picknick und Wasser selbst organisieren.','Regeln der Reserve und Bootsmöglichkeiten prüfen.'],
        sourceNote:'Recherchenotiz: Der Courant d’Huchet verbindet den Étang de Léon mit dem Atlantik und gehört zur nationalen Naturreserve.'
      },
      15: {
        imageQueries:['Gordes Luberon','Roussillon ochre trail','Luberon village Provence','Aix market'],
        links:[{label:'Gordes',query:'Gordes France'},{label:'Roussillon Ocker',query:'Roussillon ochre trail family'},{label:'Aix Markt',query:'Aix en Provence market'}],
        intro:[`Der Luberon ist Provence-Postkarte, aber von Le Tholonet kein kleiner Spaziergang: Fahrtzeit, Hitze, volle Dörfer und Parkplatzthemen. Deshalb ist Auswahl wichtiger als Vollständigkeit.`,`Nicht Gordes plus Roussillon plus noch ein Dorf. Mit Kindern ist ein Hauptziel plus Rückkehr zum Pool meistens besser.`],
        sections:[{title:'Wie ich den Tag lesen würde',body:'Nur fahren, wenn morgens wirklich Lust auf Auto da ist. Roussillon ist für Kinder oft greifbarer, weil Ockerfarben und Wege visueller sind; Gordes ist stärker als Aussicht und Erwachsenenbild.',bullets:['Früh starten.','Maximal ein Dorf ernsthaft anschauen.','Nach Mittag zurück Richtung Pool.']}],
        recommendation:'Wenn die Energie mittel ist: Aix + Calissons + Pool statt Luberon. Das ist kein Verzicht, sondern gutes Urlaubsmanagement.',
        logistics:['Parkplätze prüfen.','Mittagshitze vermeiden.','Keine drei Dörfer planen.'],
        sourceNote:'Recherchenotiz: Der Luberon ist ein großes Naturparkgebiet; Gordes und Roussillon liegen nicht direkt um die Ecke von Le Tholonet.'
      }
    };

    function render(title, eyebrow, body, side, imageQueries){
      root.innerHTML = `${galleryMarkup(imageQueries,title)}<p class="section-kicker">${eyebrow}</p><h1>${title}</h1><div class="detail-grid"><section>${body}</section><aside>${side}${checkCard()}</aside></div>${chatGPTBoxMarkup()}`;
      document.title = `${title} · France 2026`;
      currentPrompt = buildChatGPTPrompt(title, eyebrow, body, side);
      setupChatGPTBox();
    }

    function renderGuide(item, guide){
      const body = `<div class="detail-lead">${paragraphs(guide.intro)}</div>${guide.sections.map(section => `<div class="guide-section"><h3>${section.title}</h3><p>${section.body}</p>${section.custom || ''}${section.bullets ? list(section.bullets) : ''}</div>`).join('')}<h3>Meine Empfehlung für euch</h3><p>${guide.recommendation}</p><h3>Praktische Hinweise</h3>${list(guide.logistics)}<p class="source-note">${guide.sourceNote}</p>`;
      render(item.title,`${item.date} · ${item.place}`,body,linksCard(guide.links),guide.imageQueries);
    }

    function fallbackDayBody(item){
      return `<p class="detail-lead">${item.focus || item.mood}</p><p>Diese Detailseite ist noch in der Kurzfassung. Der Tageskern ist angelegt, aber die konkreten Programmpunkte sind noch nicht so ausführlich recherchiert wie bei den ausgebauten Guides.</p><h3>Entspannt</h3><p>${item.calm}</p><h3>Aktiv</h3><p>${item.active}</p><h3>Alternative</h3><p>${item.fallback}</p><h3>Nächster sinnvoller Ausbau</h3><p>Für diese Seite sollten noch Ablauf, konkrete Orte, Timing, Pack-/Reservierungshinweise und ein klarer Plan B ergänzt werden.</p>`;
    }

    function verdict(item){
      if(item.type === 'Strand') return 'Passend, solange Strömung, Sonne, Flaggen und Pausen ernst genommen werden.';
      if(item.type === 'Aktivität') return 'Guter Baustein, wenn er nicht noch mit einem zweiten großen Programmpunkt überladen wird.';
      if(item.type === 'Ausflug') return 'Lohnend, wenn ihr ihn als schlanken Halbtagesausflug plant.';
      return 'Guter Baustein, wenn ihr ihn flexibel versteht und vor Ort prüft.';
    }

    function linksCard(arr){
      if(!arr || !arr.length) return '';
      return `<div class="side-card"><h3>Direkte Links</h3>${arr.map(l => `<a href="${l.href || mapsLink(l.query)}" target="_blank" rel="noopener">${l.label}</a>`).join('')}</div>`;
    }
    function checkCard(){
      return `<div class="side-card"><h3>Vor Ort prüfen</h3><ul><li>Öffnungszeiten</li><li>Reservierung / Tickets</li><li>Parken</li><li>Hitze, Gewitter, Wasserstand oder Flaggen</li></ul></div>`;
    }

    function galleryMarkup(input,title){
      const queries = normalizeGalleryQueries(input,title);
      return `<div class="image-gallery" aria-label="Bildergalerie">${queries.map((q,i)=>`<figure class="gallery-card"><a href="${imageSourceUrl(q)}" target="_blank" rel="noopener"><img src="${galleryImageUrl(q,i)}" alt="${escapeHtml(q)}" loading="lazy" onerror="this.onerror=null;this.src='${fallbackUrl(title,i)}'"><figcaption>${escapeHtml(q)} · Herkunft öffnen ↗</figcaption></a></figure>`).join('')}</div>`;
    }
    function normalizeGalleryQueries(input,title){
      let arr = Array.isArray(input) ? input : [input];
      arr = arr.flat().filter(Boolean).map(x => String(x).trim()).filter(Boolean);
      arr = [...new Set(arr)];
      const extras = [`${title} France`,`${title} travel`,`${title} landscape`,`${title} tourism`];
      for(const e of extras){ if(arr.length >= 4) break; if(!arr.includes(e)) arr.push(e); }
      return arr.slice(0,4);
    }

    function chatGPTBoxMarkup(){
      return `<section class="ask-chatgpt"><h3>Diese Seite in ChatGPT fragen</h3><p>Kopiert einen vorbereiteten Prompt mit dem Kontext dieser Detailseite. Danach ChatGPT öffnen, einfügen und konkret nachfragen.</p><div class="ask-actions"><button type="button" data-copy-prompt>Prompt kopieren</button><button type="button" data-preview-prompt>Prompt anzeigen</button><a href="https://chatgpt.com/" target="_blank" rel="noopener">ChatGPT öffnen ↗</a></div><p class="copy-status" data-copy-status aria-live="polite"></p><textarea class="prompt-preview" data-prompt-preview readonly></textarea></section>`;
    }
    function buildChatGPTPrompt(title, eyebrow, bodyHtml, sideHtml){
      const context = [textFromHtml(bodyHtml), textFromHtml(sideHtml)].filter(Boolean).join('\n\n');
      return `Du bist mein pragmatischer Reiseassistent für unseren Familienurlaub in Frankreich 2026.\n\nKontext der aktuellen Detailseite:\nTitel: ${title}\nEinordnung: ${eyebrow}\n\n${context}\n\nRahmenbedingungen:\n- Familie mit zwei Kindern, 8 und 10 Jahre.\n- Wir mögen Baden, Tiere, Ausflüge, Essen/Kaffee und aktive, aber nicht überladene Tage.\n- Im Zweifel lieber weniger Programm, mehr Pausen, Hitze beachten.\n- Antworte konkret, knapp und praktisch.\n- Nenne klare Optionen, Timing, Pack-/Reservierungshinweise.\n- Wenn es um Öffnungszeiten, Preise, Buchungen oder Wetter geht, sage klar, dass ich es aktuell prüfen soll.\n\nMeine Frage dazu:`;
    }
    function textFromHtml(html){ const div = document.createElement('div'); div.innerHTML = html || ''; return div.textContent.replace(/\s+/g,' ').trim(); }
    async function copyText(text){
      if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); return; }
      const textarea = document.createElement('textarea'); textarea.value = text; textarea.style.position = 'fixed'; textarea.style.left = '-9999px'; document.body.appendChild(textarea); textarea.focus(); textarea.select(); const ok = document.execCommand('copy'); textarea.remove(); if(!ok) throw new Error('copy failed');
    }
    function setupChatGPTBox(){
      const copyButton = root.querySelector('[data-copy-prompt]');
      const previewButton = root.querySelector('[data-preview-prompt]');
      const preview = root.querySelector('[data-prompt-preview]');
      const status = root.querySelector('[data-copy-status]');
      copyButton?.addEventListener('click', async () => { try { await copyText(currentPrompt); status.textContent = 'Prompt kopiert. Jetzt ChatGPT öffnen und einfügen.'; } catch(e) { preview.value = currentPrompt; preview.classList.add('open'); preview.focus(); preview.select(); status.textContent = 'Automatisches Kopieren ging nicht. Prompt unten manuell kopieren.'; }});
      previewButton?.addEventListener('click', () => { preview.value = currentPrompt; preview.classList.toggle('open'); if(preview.classList.contains('open')) preview.focus(); });
    }

    function imageQueriesForDestination(item){
      if(item.id === 'tours') return ['Tours Loire old town','Tours France market','Guinguette de Tours','Loire river Tours'];
      if(item.id === 'moliets') return ['Moliets et Maa plage centrale','Plage Centrale Moliets','Moliets surf','Moliets Landes'];
      if(item.id === 'tholonet') return ['Le Tholonet Sainte Victoire','Montagne Sainte Victoire','Aix en Provence countryside','Provence Le Tholonet'];
      return [item.title,...(item.links||[]).map(l=>l.query)];
    }
    function imageQueriesForPoi(item){ return [item.name,item.query,`${item.place || ''} ${item.name}`,`${item.name} France`]; }

    if(type === 'destination'){
      const item = data.destinations.find(x => x.id === id);
      render(item.title,'Stationsguide',`<p class="detail-lead">${item.deep || item.story}</p><h3>Warum das für euch passt</h3><p>${item.familyAngle || item.story}</p><h3>Highlights</h3>${list(item.highlights)}<h3>Konkrete Tipps</h3>${list(item.tips)}`,linksCard(item.links),imageQueriesForDestination(item));
    } else if(type === 'day'){
      const index = Number(id);
      const item = data.days[index];
      const guide = dayGuides[index];
      if(guide) renderGuide(item,guide);
      else {
        const related = data.pois.filter(p => p.place === item.place).slice(0,4).map(p => ({label:p.name,query:p.query}));
        render(item.title,`${item.date} · ${item.place}`,fallbackDayBody(item),linksCard(related),[`${item.title} ${item.place}`,...related.map(l=>l.query)]);
      }
    } else if(type === 'poi'){
      const item = data.pois[Number(id)];
      render(item.name,`${item.type} · ${item.place}`,`<p class="detail-lead">${item.text}</p><h3>Warum lohnt sich das?</h3><p>${item.why || item.text}</p><h3>Praktische Tipps</h3>${list(item.tips)}<h3>Familienfazit</h3><p>${verdict(item)}</p>`,`<a class="maps-button" href="${mapsLink(item.query)}" target="_blank" rel="noopener">In Google Maps öffnen</a>${linksCard(item.links)}`,imageQueriesForPoi(item));
    } else if(type === 'food'){
      const item = data.food[Number(id)];
      render(item.title,`Essen · ${item.place}`,`<p class="detail-lead">${item.text}</p><h3>Warum passt das?</h3><p>${item.why || item.text}</p><h3>Tipps</h3>${list(item.tips)}<h3>Familienfazit</h3><p>Für euch zählt hier weniger maximale Kulinarik, sondern gute Stimmung, kurze Wege und planbare Kinderenergie.</p>`, item.query ? `<a class="maps-button" href="${mapsLink(item.query)}" target="_blank" rel="noopener">In Google Maps suchen</a>` : '', [item.query || item.title,`${item.place} restaurant`,`${item.place} terrace`,`${item.place} food`]);
    } else {
      root.innerHTML = '<h1>Nichts gefunden</h1><p>Zurück zur Übersicht.</p>';
    }
  </script>
</body>
</html>
