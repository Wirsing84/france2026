font-size:.72rem;line-height:1.25;color:#657286;padding:8px 10px;background:rgba(255,255,255,.86)}.gallery-card:hover{transform:translateY(-1px);box-shadow:0 16px 36px rgba(23,32,42,.14)}.ask-chatgpt{margin-top:34px;border-radius:24px;border:1px solid rgba(23,32,42,.14);background:linear-gradient(135deg,rgba(23,107,135,.10),rgba(246,189,96,.18));padding:22px}.ask-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.ask-actions button,.ask-actions a{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border-radius:999px;padding:0 16px;border:1px solid rgba(23,32,42,.16);font-weight:900;cursor:pointer}.ask-actions button{background:#17202a;color:white}.ask-actions a{background:rgba(255,255,255,.72);color:#176b87}.copy-status{margin-top:10px;font-size:.9rem;font-weight:800;color:#5f8d4e;min-height:1.2em}.prompt-preview{display:none;margin-top:14px;width:100%;min-height:180px;border:1px solid rgba(23,32,42,.16);border-radius:18px;padding:12px;background:rgba(255,255,255,.78);color:#17202a;font:inherit}.prompt-preview.open{display:block}@media(max-width:900px){.detail-grid{grid-template-columns:1fr}.detail-card{padding:22px}.image-gallery{grid-template-columns:repeat(2,minmax(0,1fr))}.gallery-card img{height:150px}.decision-row{grid-template-columns:1fr}}@media(max-width:520px){.image-gallery{grid-template-columns:1fr}.gallery-card img{height:190px}.ask-actions{display:grid}.ask-actions a,.ask-actions button{width:100%}}

  <script src='data.js?v=20260718-2'></script>
  <script>
    const data = window.FRANCE2026;
    const params = new URLSearchParams(location.search);
    const type = params.get('type');
    const id = params.get('id');
    const root = document.querySelector('#detailRoot');
    let currentPrompt = '';

    const mapsLink = query => `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    const imageSourceUrl = query => `https://www.bing.com/images/search?q=${encodeURIComponent(query)}`;
    const galleryImageUrl = (query,index) => `https://tse${(index%4)+1}.mm.bing.net/th?q=${encodeURIComponent(String(query).trim())}&w=760&h=520&c=7&rs=1&p=0&o=5&pid=1.7`;
    const fallbackUrl = (title,index) => `https://picsum.photos/seed/${encodeURIComponent(title+'-'+index)}/760/520`;
    const escapeHtml = value => String(value).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const list = arr => `<ul>${(arr||[]).map(x => `<li>${x}</li>`).join('')}</ul>`;
    const paragraphs = arr => (arr||[]).map(x => `<p>${x}</p>`).join('');
    const L = (label, query, href) => ({label, query, href});
    const S = (title, body, bullets = [], custom = '') => ({title, body, bullets, custom});
    const G = (intro, sections, recommendation, logistics, links, images, sourceNote) => ({intro, sections, recommendation, logistics, links, imageQueries: images, sourceNote});

    const dayGuides = {
      0: G([
        `Das ist kein Urlaubstag im engeren Sinn, sondern der Tag, der darüber entscheidet, ob ihr in Tours entspannt ankommt oder schon überdreht startet. Ziel ist nicht, unterwegs noch ein Erlebnis einzubauen, sondern die lange Fahrt sauber zu strukturieren: früh genug los, realistische Pausen, Snacks griffbereit, Ankunft ohne Abendprogramm-Druck.`,
        `Für die Kinder ist dieser Tag vor allem Aushalten, Wechseln und Ankommen. Deshalb sollte der Abend in Tours bewusst klein sein: Unterkunft, kurzer Loireblick, einfache Versorgung, Schlaf. Alles andere klingt auf dem Papier nett und wird nach der Fahrt schnell zäh.`
      ],[
        S('Fahrtlogik',`Plant die Strecke als Reisetag mit klaren Pausen, nicht als Sightseeing-Transfer. Entscheidend sind Wasser, Snacks, Ladekabel, Hörbuch/Playlist und ein Plan, was passiert, wenn ihr später ankommt als gedacht.`,['Letzte 90 Minuten nicht noch mit Zusatzstopp verlängern.','Einkauf oder Abendessen einfach halten.','Kinder nicht direkt nach Ankunft in Stadtprogramm ziehen.']),
        S('Ankommen in Tours',`Wenn die Unterkunft bezogen ist, reicht ein kurzer Spaziergang Richtung Loire oder ein kleiner Essens-/Einkaufsblock. Der erste Eindruck soll weich sein: Fluss, Luft, Beine vertreten, fertig.`,['Keine Reservierung mit engem Zeitfenster, wenn die Fahrt unsicher ist.','Abends Taschen nur grob sortieren, Kanu-/Tageszeug erst am nächsten Morgen.']),
        S('Plan B',`Wenn Stau, Müdigkeit oder Hitze zuschlagen, ist ein Supermarktessen in der Unterkunft kein Scheitern. Es macht den nächsten Tag besser.`)
      ],`Meine Empfehlung: An diesem Tag keine touristische Ambition. Der beste Erfolg ist, wenn alle halbwegs friedlich in Tours schlafen gehen.`,['Warnwesten/Unterlagen griffbereit.','Wasser und Snacks im Innenraum, nicht im Kofferraum.','Unterkunfts-Check-in und Parkplatz vor Abfahrt prüfen.'],[L('Google Maps: Tours','Tours France'),L('Loireufer Tours','Tours Loire river walk')],['Darmstadt Tours roadtrip','Tours Loire evening','French motorway family roadtrip','Tours old town Loire'],`Faktenstatus: basiert auf eurer Route und allgemeiner Reiselogik; aktuelle Verkehrs-/Parkinformationen vor Abfahrt prüfen.`),
      1: G([
        `Der Loire-Tag ist der eigentliche Urlaubsstart. Er sollte Tours nicht als Pflicht-Stadtbesichtigung behandeln, sondern als leichte Mischung aus Markt, Altstadt, Fluss und Abendstimmung. „Loire“ heißt hier konkret: Uferwege, Brückenblick, Guinguette, Rad-/Spazieroptionen und ein ruhiger Rhythmus am Wasser.`,
        `Für Kinder funktionieren an diesem Tag kleine sichtbare Ziele besser als Kulturabstraktion: Marktstand aussuchen, Eis finden, Brücke anschauen, kurze Runde gehen oder fahren, abends draußen sitzen. Der Tag darf bewusst unvollständig bleiben.`
      ],[
        S('Morgens: Markt, Altstadt, kurzer Orientierungskreis',`Startet mit einem kurzen Rundgang statt großem Programm. Les Halles oder ein Markt-/Bäckereistopp, dann Altstadt nur dosiert. Die Kinder brauchen ein erstes Erfolgserlebnis, nicht 90 Minuten Stadtgeschichte.`,['Ein Snack-/Eisziel vorher ankündigen.','Nicht mehrere Kirchen/Museen kombinieren.','Bei Hitze früh oder spät gehen.']),
        S('Loire à Vélo nur als kleine Runde',`Wenn ihr Räder nehmt, dann nur eine kurze, familienkompatible Runde. Die offizielle Loire-à-Vélo-Logik rund um Tours ist stark, aber ihr braucht keinen Etappenstolz. Ziel ist Bewegung am Fluss, nicht Kilometer sammeln.`,['Route vorher grob prüfen.','Schatten, Wasser und Rückweg im Blick behalten.','Bei müden Kindern lieber Spaziergang statt Mietradlogistik.']),
        S('Abend: Guinguette statt Restaurantstress',`Die Guinguette de Tours ist als Sommer-Ort am Loireufer der bessere erste Abend als ein steifes Restaurant. Für euch zählt: draußen sitzen, einfache Essenslogik, Flussnähe, Kinder dürfen noch etwas gucken.`,['Früh kommen, wenn ihr sitzen wollt.','Nicht zu spät essen lassen.','Bei Regen/Überfüllung einfache Alternative bereithalten.'])
      ],`Meine Empfehlung: Erst Markt/Altstadt kurz, dann Pause, abends Guinguette. Eine Radoption nur, wenn alle wirklich Lust haben.`,['Öffnungszeiten der Märkte und Guinguette prüfen.','Bei Radmiete Reservierung/Kinderradgrößen klären.','Mittagshitze vermeiden.'],[L('Les Halles / Markt Tours','Les Halles de Tours market'),L('Guinguette Tours','Tours sur Loire Guinguette'),L('Loire à Vélo Tours','Loire a Velo Tours bike rental')],['Tours Loire','Les Halles de Tours','Guinguette de Tours','Loire a Velo Tours'],`Faktenstatus: abgeglichen mit offiziellen Tourismusseiten zu Tours/Loire-à-Vélo und Guinguette; Öffnungszeiten und Tagesprogramm aktuell prüfen.`),
      2: G([
        `Dieser Tag darf nicht nur „irgendwas mit Loire“ heißen. Eigentlich stehen hier zwei sehr unterschiedliche Programme zur Wahl: eine echte Wasseraktivität ab Vouvray oder ein klarer Kinder-Action-Joker im Family Park Sorigny. Beides kann gut sein, aber es löst unterschiedliche Urlaubssituationen.`,
        `Die Kanutour ist der bessere Plan, wenn ihr nach dem Ankommen in Tours ein gemeinsames Erlebnis wollt: draußen, ruhig, auf dem Wasser, ohne dass es ein ganzer Ausflugstag wird. Der Abschnitt Sablière–Vouvray ist als kurze Einstiegsstrecke interessant, weil er nicht nach Expedition klingt.`,
        `Family Park ist dagegen keine Loire-Romantik, sondern ein pragmatisches Ventil: Wenn die Kinder nach Stadt, Fahrt und Erwachsenenprogramm etwas Eigenes brauchen, ist das wahrscheinlich der bessere Joker.`
      ],[
        S('Option 1: Familien-Kanutour ab Vouvray',`Der konkrete Kern ist die Strecke Sablière–Vouvray mit Tours & Canoë. Laut Anbieter ist das der kleinste Parcours und als Einstieg für Kinder und Erwachsene gedacht. Der Vorteil: Die Loire wird greifbar – Strömung, Sandbänke, Ufer, Vögel, Paddelrhythmus.`,['Als Halbtagesbaustein denken, nicht als ganzer Tag.','Nicht mit Schloss, langer Altstadt und großem Abendessen kombinieren.','Vorab klären: Uhrzeit, Reservierung, Rücktransport, Schwimmwesten, Wetter und Gewitterrisiko.']),
        S('So würde ich den Kanu-Tag bauen',`Frühstück, Wasserflaschen, Sonnencreme, Wechselkleidung. Dann nach Vouvray zur Basis. Nach der Tour kein zweites großes Programm dranhängen. Besser: Snack, trockene Kleidung, Loireufer, Pause. Abends Guinguette oder Picknick, wenn noch Stimmung da ist.`,['Vormittag oder früher Nachmittag für Kanu.','Danach bewusst Pause.','Kein „noch schnell ein Schloss“.']),
        S('Option 2: Family Park Sorigny',`Family Park ist die richtige Entscheidung, wenn die Kinder heute nicht „schön“, sondern „meins“ brauchen. Der Park liegt südlich von Tours in Sorigny und ist ein klassischer Freizeitpark-Baustein. Für eure Reise ist das kein kultureller Höhepunkt, aber ein nützlicher Ausgleichstag.`,['Gut bei Actionbedarf und müden Stadtkindern.','Vorher Öffnungszeiten, Attraktionen, Größenregeln und Tickets prüfen.','Als Halbtagesprogramm planen.']),
        S('Entscheidung am Morgen',`Die Frage ist nicht, was objektiv besser ist, sondern welche Energie ihr habt.`,[],`<div class='decision-table'><div class='decision-row'><strong>Kinder wollen Action</strong><span>Family Park.</span></div><div class='decision-row'><strong>Alle wollen draußen sein</strong><span>Kanu ab Vouvray.</span></div><div class='decision-row'><strong>Hitze / Gewitter</strong><span>Sehr vorsichtig entscheiden; Wasser klingt gut, ist aber exponiert.</span></div><div class='decision-row'><strong>Alle nur mittel drauf</strong><span>Vouvray ohne Kanu, Loireufer, Eis, früher Schluss.</span></div></div>`)
      ],`Meine klare Empfehlung: Wenn Wetter und Stimmung passen, Kanu ab Vouvray priorisieren. Family Park als echter Plan B, nicht als zweite Aktivität am selben Tag.`,['Kanu reservieren oder Verfügbarkeit prüfen.','Wetter/Gewitterrisiko ernst nehmen.','Wasserschuhe, Wechselkleidung, Handtuch, Brillenband, Wasser, Sonnenschutz.','Bei Family Park Größen-/Altersregeln und Öffnungszeiten prüfen.'],[L('Tours & Canoë Basis Vouvray','Tours Canoe La Frilliere Vouvray'),L('Familien-Kanutour Sablière–Vouvray','Balade canoe en famille Sabliere Vouvray'),L('Family Park Sorigny','Family Park Sorigny')],['Vouvray Loire canoe','Tours Canoe Vouvray','Family Park Sorigny','Vouvray Loire river'],`Faktenstatus: geprüft gegen offizielle Tours-Tourismus-Seite, Tours & Canoë und Family Park. Preise, Slots und Öffnungszeiten vor Buchung prüfen.`),
      3: G([
        `Der Wechsel von Tours nach Moliets ist mehr als eine Fahrt: Ihr wechselt vom Fluss-/Stadtmodus in den Atlantikmodus. Dieser Tag sollte bewusst niedrigschwellig bleiben, weil die Kinder nach der Anfahrt zwar Strand sehen wollen, aber nicht unbedingt ein volles Abendprogramm schaffen.`,
        `Der beste erste Moliets-Moment ist nicht „alles auspacken und perfekt ankommen“, sondern Sand sehen, Luft spüren, vielleicht zur Plage Centrale laufen und dann unkompliziert essen.`
      ],[
        S('Fahrt und Übergang',`Packt morgens so, dass ihr abends nicht suchen müsst: Badesachen/Handtücher oben, einfache Abendkleidung griffbereit, Ladegeräte und Snacks separat.`,['Nicht den ganzen Koffer direkt neu sortieren.','Ankunft, Unterkunft, kurzer Strandblick reichen.','Einkauf nur Basis: Frühstück, Wasser, einfache Snacks.']),
        S('Erster Strandblick',`Die Plage Centrale ist als erster Orientierungspunkt sinnvoll, weil sie Infrastruktur und Surfgefühl bündelt. Es muss kein langer Badetag werden. Die Kinder sollen zuerst verstehen: Wo ist der Strand, wo sind Wellen, wo sind Wege zurück?`,['Flaggen/Strömung nur anschauen und erklären.','Kein „jetzt noch schnell richtig schwimmen“, wenn alle müde sind.']),
        S('Abendessen',`Take-away, Pizza, einfache Unterkunftsküche oder strandnahe Option sind besser als lange Restaurantentscheidung. Der Tag war schon voll genug.`)
      ],`Meine Empfehlung: Nur ankommen, Strand sehen, einfach essen. Der eigentliche Moliets-Urlaub beginnt am nächsten Morgen.`,['Badesachen/Handtücher griffbereit packen.','Park-/Check-in-Infos prüfen.','Erste Einkaufsliste klein halten.'],[L('Plage Centrale Moliets','Plage Centrale Moliets et Maa'),L('Supermarkt Moliets','supermarket Moliets et Maa'),L('Restaurants Moliets Plage','restaurants Moliets Plage')],['Moliets et Maa plage centrale','Moliets arrival','Moliets Landes','Plage Centrale Moliets'],`Faktenstatus: basiert auf eurer Reiseroute und lokalen Zielpunkten; konkrete Öffnungszeiten/Restaurants aktuell prüfen.`),
      4: G([
        `Der erste Atlantiktag ist kein normaler Strandtag. Er ist Orientierung: Wellen lesen, Flaggen verstehen, Wege merken, Schatten organisieren, herausfinden, wie viel Meer die Kinder wirklich wollen.`,
        `Moliets hat laut Gemeinde zwei sehr unterschiedliche Strandstimmungen: die lebendigere Plage Centrale und die ruhigere, natürlichere Plage des Chênes-Lièges. Für den ersten Tag ist Plage Centrale praktisch, aber ihr solltet sie nicht automatisch zur einzigen Routine machen.`
      ],[
        S('Plage Centrale als Startpunkt',`Plage Centrale ist gut für den ersten Tag, weil Infrastruktur, Surf-Atmosphäre und Orientierung zusammenkommen. Genau deshalb kann es dort auch voll und reizintensiv sein. Nutzt den Strand als Lernort: Wo stehen Flaggen? Wo sind bewachte Bereiche? Wo ist Rückweg/Toilette/Essen?`,['Erst beobachten, dann ins Wasser.','Klare Grenze definieren, wie weit die Kinder gehen dürfen.','Mittagssonne begrenzen.']),
        S('Bodyboard / Surf schnuppern',`Heute noch nicht alles buchen müssen. Besser ist ein erster Check: Welche Schulen gibt es, welche Zeiten passen, welche Bedingungen sind für Anfänger okay? Wenn die Kinder sehr heiß darauf sind, klärt einen Termin für die nächsten Tage.`,['Nicht nach langem Strandvormittag noch Kurs erzwingen.','Surf eher früh in der Woche planen.']),
        S('Ruhigere Alternative: Lac de Léon',`Wenn Wellen, Wind oder Stimmung nicht passen, ist Lac de Léon eine gute ruhigere Wasseroption. Das ist kein „schlechterer Strand“, sondern ein anderer Modus: weniger Atlantikdrama, mehr See-/Picknicklogik.`)
      ],`Meine Empfehlung: Plage Centrale für Orientierung, aber kurz genug halten. Wenn die Wellen euch überfordern, sofort auf See/Pool/kurzen Strandabschluss umschalten.`,['Flaggen und Bewachung beachten.','Sonnencreme, UV-Shirts, Wasser, Schatten.','Surfkurs nicht spontan in die müdesten Stunden legen.'],[L('Plage Centrale','Plage Centrale Moliets et Maa'),L('Plage des Chênes-Lièges','Plage des Chenes Lieges Moliets'),L('Lac de Léon','Lac de Leon Landes')],['Plage Centrale Moliets','Moliets surf school','Lac de Leon Landes','Moliets ocean'],`Faktenstatus: Moliets-Gemeinde beschreibt Plage Centrale als lebendiger und Chênes-Lièges als ruhiger/natürlicher. Flaggen, Wasserbedingungen und Bewachung immer tagesaktuell prüfen.`),
      5: G([
        `Dieser Tag ist für Surf oder zumindest Surf-Organisation reserviert. Surf funktioniert nicht gut als „mal schauen nachmittags, wenn wir eh müde sind“. Für Anfänger und Kinder ist Timing entscheidend: ausgeruht, klare Bedingungen, nicht in der schlimmsten Hitze.`,
        `Hossegor/Capbreton ist dagegen der Ausweichmodus: mehr Szene, Kaffee, Hafen, Surfshops, Bummeln – aber nicht als zusätzlicher Programmdruck nach einem Kurs.`
      ],[
        S('Surfkurs richtig einsetzen',`Wenn ihr einen Kurs macht, sollte er der Hauptpunkt des Tages sein. Danach brauchen die Kinder Pause, Essen, Schatten und vielleicht später nur noch Pool oder kurzer Strand.`,['Kurszeit, Treffpunkt und Ausrüstung vorher klären.','Nicht direkt danach Stadt- oder Restaurantprogramm erzwingen.','Zweiter Kurstermin möglich halten.']),
        S('Wenn kein Kurs klappt',`Dann bleibt es trotzdem ein guter Tag: Wellen beobachten, Bodyboard, Surfshops anschauen, Kurs für später buchen. Es muss nicht sofort der perfekte Surf-Moment sein.`),
        S('Hossegor / Capbreton',`Hossegor ist als Surf-/Kaffee-/Bummelkontext interessanter als viele reine Ferienorte. Capbreton bringt Hafenlogik dazu. Das ist gut bei bedecktem Wetter oder wenn ihr genug Strand hattet.`,['Als Halbtag, nicht als Ganztag.','Parken vorher prüfen.','Kinderziel definieren: Eis, Hafen, Shop oder Kaffee?'])
      ],`Meine Empfehlung: Surfkurs nur, wenn er vormittags oder sinnvoll getaktet liegt. Sonst lieber organisieren, Strand kurz halten und Hossegor/Capbreton als lockeren Kontrast nutzen.`,['Surfbedingungen und Anfänger-Eignung prüfen.','Wasser, Sonnenschutz, trockene Kleidung.','Parken in Hossegor/Capbreton vorab checken.'],[L('Surf schools Moliets','surf school Moliets et Maa kids'),L('Hossegor Zentrum/Kaffee','Hossegor cafes coffee'),L('Capbreton Hafen','Capbreton port restaurants')],['Hossegor surf beach','Moliets surf school','Capbreton harbour','Hossegor cafe'],`Faktenstatus: Hossegor ist offiziell als Surf-/Strand-/Pinien-/Lifestyle-Destination beschrieben. Konkrete Surfkurse, Bedingungen und Anbieter nur tagesaktuell buchen.`),
      6: G([
        `Dieser Tag ist der bewusste Gegenpol zu den reinen Atlantiktagen. Lac de Léon und Courant d’Huchet bringen ruhigeres Wasser, mehr Grün, mehr Schatten und einen echten Naturwechsel.`,
        `Der Courant d’Huchet verbindet den Étang/Lac de Léon mit dem Atlantik und ist als Naturreservat ein sensibler Raum. Genau deshalb ist er interessant – aber auch kein Ort für planlose „wir machen einfach irgendwas“-Logik.`
      ],[
        S('Lac de Léon zuerst',`Mit Kindern ist der See der bessere Einstieg: ruhiger als Atlantik, picknicktauglicher, überschaubarer. Hier könnt ihr Wasser und Pause kombinieren, ohne direkt wieder mit Wellen und Strömung zu arbeiten.`,['Vormittag nutzen.','Picknick und Wasser selbst mitbringen.','Mückenschutz mitnehmen.']),
        S('Courant d’Huchet als Naturbaustein',`Der Courant ist der besondere Teil: Wasserlauf, Feuchtgebiet, Wald, Dünen und Mündung. Prüft vorher, ob Spaziergang, Besuch an einem Empfangspunkt oder Bootsfahrt mit den Bateliers sinnvoll ist.`,['Regeln der Reserve beachten.','Nicht jede Strecke ist frei/privat befahrbar.','Bootsmöglichkeiten aktuell prüfen.']),
        S('Tagesrhythmus',`Der Tag soll nicht zur langen Naturkundewanderung werden. See + kurzer Courant-Baustein reicht. Danach Pool oder später kurzer Strand.`)
      ],`Meine Empfehlung: See und Courant als Halbtagswechsel nutzen. Nicht wieder Hauptstrand, aber auch keine große Expedition daraus machen.`,['Mückenschutz, Wasser, Picknick.','Reserve-Regeln und Zugänge prüfen.','Bootsfahrt nur mit aktueller Verfügbarkeit planen.'],[L('Lac de Léon','Lac de Leon Landes'),L('Courant d’Huchet Reserve','Reserve naturelle Courant d Huchet'),L('Bateliers Courant d’Huchet','Bateliers Courant d Huchet')],['Lac de Leon Landes','Courant d Huchet Moliets','Reserve naturelle Courant d Huchet','Leon Landes lake'],`Faktenstatus: abgeglichen mit offizieller Reserve, Gemeinde Léon und Moliets-Informationen. Zugang, Boot und Regeln tagesaktuell prüfen.`),
      7: G([
        `Adrenaline Parc ist kein Kulturprogramm, sondern ein Ventil. Nach mehreren Strand-/Wassertagen kann ein Kletterwaldtag sehr gut funktionieren, weil die Kinder etwas Eigenes machen und körperlich gefordert werden.`,
        `Der offizielle Park beschreibt sich als großer Accrobranche-/Freizeitpark in Moliets, in der Nähe von Ort und Strand. Für euch ist entscheidend: Alters-/Größenregeln, Schatten, Zeitfenster und die Frage, ob alle genug Energie haben.`
      ],[
        S('Kletterwald als Hauptpunkt',`Plant den Park als Hauptaktivität, nicht als Zusatz nach vollem Strandtag. Klettern ist mental und körperlich anstrengender, als es auf der Karte wirkt.`,['Vorher Parcours/Altersgrenzen prüfen.','Geschlossene Schuhe.','Wasser und Pausen.']),
        S('Wenn Energie fehlt',`Dann nicht erzwingen. Minigolf, Eis, Pool oder ein ruhiger Strandzugang sind kein schlechter Plan, sondern der richtige Umgang mit Urlaubsmüdigkeit.`),
        S('Abend danach',`Nach Kletterwald keinen „schönen“ Restaurantabend erzwingen. Wahrscheinlich reicht einfach essen, duschen, schlafen.`)
      ],`Meine Empfehlung: Nur machen, wenn morgens wirklich Energie da ist. Dann aber klar priorisieren und danach frei lassen.`,['Öffnungszeiten, Buchung, Parcours/Größenregeln prüfen.','Geschlossene Schuhe einpacken.','Nicht in die Mittagshitze legen, wenn vermeidbar.'],[L('Adrenaline Parc','Adrenaline Parc Moliets'),L('Plage des Chênes-Lièges','Plage des Chenes Lieges Moliets'),L('Minigolf Moliets','mini golf Moliets et Maa')],['Adrenaline Parc Moliets','Moliets accrobranche','Plage des Chenes Lieges Moliets','Moliets mini golf'],`Faktenstatus: offizielle Adrenaline-Parc-Seite nennt Moliets und Öffnungssaison grob April bis November; konkrete Zeiten/Parcours tagesaktuell prüfen.`),
      8: G([
        `Der baskische Ausflug ist der stärkste Kontrast im Moliets-Block: mehr Stadt, mehr Farbe, mehr Essen, mehr Menschen. Er sollte aber nicht zu einem langen „wir müssen alles sehen“-Tag werden.`,
        `Für euch ist Bayonne wahrscheinlich der bessere Kern als Biarritz: Markthalle, Altstadt, Schokolade, kurze Wege. Biarritz/Grande Plage ist bildstark, aber voller und logistischer. Capbreton ist der pragmatische Hafen-/Essensplan.`
      ],[
        S('Bayonne als Hauptziel',`Bayonne funktioniert familienfreundlich, wenn ihr es kurz haltet: Halles/Marktumfeld, Gassen, Schokolade, Snack, Rückzug. Die offizielle Tourismusseite hat explizit Familien- und „Bayonne an einem Tag“-Logik.`,['Früh los statt Mittagshitze.','Maximal zwei kleine Ziele.','Schokolade/Eis als Kinderanker.']),
        S('Biarritz optional',`Biarritz ist schön, aber mit Kindern in der Hochsaison schnell viel: Parken, Menschen, Strandlogik, Hitze. Grande Plage ist ikonisch, aber nur sinnvoll, wenn ihr wirklich noch Energie habt.`,['Nicht Bayonne + ausgedehnt Biarritz + langes Abendessen.','Bei Strand: offizielle Bewachung/Flaggen prüfen.']),
        S('Capbreton als kleinerer Plan',`Wenn Stadt zu viel ist, ist Capbreton Hafen/Essensrunde die entspanntere Alternative: weniger ikonisch, dafür einfacher als kompletter Baskenlandtag.`)
      ],`Meine Empfehlung: Bayonne als Hauptziel. Biarritz nur als kurzer Bonus oder Fotostopp, nicht als Pflicht. Bei müden Kindern Capbreton statt Baskenland-Marathon.`,['Parken/Anfahrt prüfen.','Mittagshitze vermeiden.','Biarritz-Strand nur mit aktueller Wasser-/Bewachungslage.'],[L('Bayonne Tourist Office','Bayonne tourist office family'),L('Biarritz Grande Plage','Biarritz Grande Plage'),L('Capbreton Hafen','Capbreton port')],['Bayonne old town market','Bayonne Les Halles','Biarritz Grande Plage','Capbreton harbour'],`Faktenstatus: abgeglichen mit offiziellen Bayonne-/Biarritz-/Capbreton-Informationen; konkrete Märkte, Parken und Badebedingungen aktuell prüfen.`),
      9: G([
        `Der letzte Atlantiktag ist kein Tag für neue große Ideen. Er ist der Tag für Wiederholung: Lieblingsstrand, Lieblingswelle, vielleicht Surfkurs 2, Bodyboard oder ein letzter Abendspaziergang.`,
        `Kinder erinnern sich oft stärker an „nochmal das Beste“ als an „noch eine neue Sehenswürdigkeit“. Deshalb sollte dieser Tag bewusst nicht maximiert werden.`
      ],[
        S('Favoritenrunde',`Lasst jeden eine Sache nennen, die er noch einmal machen will: Plage Centrale, ruhigerer Strand, Eis, Bodyboard, Pool, Abendspaziergang. Daraus wird ein realistischer Plan, nicht vier Pläne.`,['Maximal ein Hauptding.','Packen früh in kleinen Blöcken.','Abend nicht zu spät.']),
        S('Surfkurs 2 nur bei echtem Wunsch',`Ein zweiter Kurs ist sinnvoll, wenn der erste gut war und alle Energie haben. Sonst lieber freie Wellenzeit oder Zuschauen.`),

      ],`Meine Empfehlung: Wiederholen statt sammeln. Der beste letzte Moliets-Tag ist klar, leicht und früh genug beendet.`,['Nasses Zeug trocknen lassen.','Fahrt-/Frühstückssachen separat legen.','Surf/Strand nur bei passenden Bedingungen.'],[L('Plage Centrale','Plage Centrale Moliets et Maa'),L('Plage des Chênes-Lièges','Plage des Chenes Lieges Moliets'),L('Surf Schools','surf school Moliets et Maa kids')],['Plage Centrale Moliets','Plage des Chenes Lieges Moliets','Moliets surf','Moliets sunset'],`Faktenstatus: basiert auf Reiseablauf und geprüften Moliets-Strandinformationen; aktuelle Wasserbedingungen prüfen.`),
      10: G([
        `Das ist die lange Transitionsetappe vom Atlantik in die Provence. Inhaltlich ist der Tag einfach: sicher fahren, ankommen, Unterkunft beziehen, Pool/Abendessen, keine Ambition.`,
        `Je besser ihr morgens sortiert seid, desto weniger wird Le Tholonet abends von Kofferchaos aufgefressen. Der erste Provence-Moment darf klein sein: Licht, Pool, Einkauf, vielleicht ein Blick Richtung Sainte-Victoire.`
      ],[
        S('Fahrtag ohne Zusatzprogramm',`Moliets → Le Tholonet ist kein Tag für Zwischenstopps, die auf der Karte nett aussehen. Mit Kindern ist das Risiko hoch, dass jeder Extra-Halt den Abend ruiniert.`,['Früh genug los.','Pausen realistisch, nicht romantisch planen.','Abendessen simpel halten.']),
        S('Ankommen in Le Tholonet',`Der Ort ist Basis, nicht Event. Pool, Einkauf, einmal Umgebung verstehen, fertig. Wenn noch Energie da ist, kurzer Blick Richtung Sainte-Victoire – aber nicht als Wanderung.`),
        S('Provence-Regel ab jetzt',`Ab jetzt gilt: morgens raus, mittags Schatten/Pool, abends wieder langsam. Diese Logik sollte schon heute beginnen.`)
      ],`Meine Empfehlung: Komplett als Fahrt-/Ankunftstag behandeln. Alles andere ist Bonus und darf wegfallen.`,['Check-in/Parken prüfen.','Pool-/Badesachen griffbereit.','Abendessen/Einkauf klein halten.'],[L('Le Tholonet','Le Tholonet France'),L('Sainte-Victoire Aussicht','Montagne Sainte Victoire Le Tholonet viewpoint'),L('Supermarkt Le Tholonet','supermarket Le Tholonet')],['Le Tholonet Sainte Victoire','Montagne Sainte Victoire','Le Tholonet Provence','Aix en Provence countryside'],`Faktenstatus: basiert auf eurer Etappe und offizieller Aix/Sainte-Victoire-Ortslogik; Verkehr/Check-in aktuell prüfen.`),
      11: G([

      ],[
        S('Vormittag: Markt und Cours Mirabeau',`Geht früh. Marktstände, Obst, Oliven, Brot, Calissons oder etwas Kleines für später. Dann Cours Mirabeau als Achse: Brunnen, Platanen, Cafélogik, aber kein langer Kulturmarsch.`,['Kinderauftrag: schönsten Brunnen finden.','Ein süßes Ziel einbauen.','Mittags raus aus der Stadt.']),

      ],`Meine Empfehlung: Aix kurz und früh oder spät. Markt + Eis/Calissons + Rückzug ist besser als „wir schauen uns Aix an“.`,['Markttage/-orte aktuell prüfen.','Parken/Anfahrt planen.','Mittagshitze meiden.'],[L('Cours Mirabeau','Cours Mirabeau Aix en Provence'),L('Aix Märkte','Aix en Provence market'),L('Calissons Aix','calissons Aix en Provence')],['Aix en Provence market','Cours Mirabeau Aix','Aix calissons','Aix en Provence old town'],`Faktenstatus: abgeglichen mit offizieller Aix-Tourismus- und Stadtinformation zu Märkten/Cours Mirabeau; konkrete Marktstände/Zeiten aktuell prüfen.`),
      12: G([
        `Sainte-Victoire ist der stärkste Naturanker in der Provence-Station. Mit Kindern im August heißt das aber nicht: Gipfel, lange Wanderung, Mittagshitze. Es heißt: Landschaft sehen, Roques-Hautes/Picknick prüfen, früh raus, kurz halten.`,

        S('Roques-Hautes als Familienlogik',`Roques-Hautes ist als zugänglicher Natur-/Picknickanker sinnvoller als ein heißer langer Aufstieg. Die Kinder können schauen, laufen, Pause machen, ohne dass ihr tief in den Berg müsst.`),

      ],`Meine Empfehlung: Früh, kurz, landschaftlich. Keine heroische Wanderung. Danach konsequent Pool/Schatten.`,['Massif-Zugang/Waldbrandrisiko prüfen.','Wasser, Kappen, Schuhe, Sonnenschutz.','Keine Mittagshitze.'],[L('Sainte-Victoire','Montagne Sainte Victoire Le Tholonet'),L('Roques Hautes','Roques Hautes Sainte Victoire'),L('Musée du Calisson','Musee du Calisson Aix en Provence')],['Sainte Victoire Roques Hautes','Montagne Sainte Victoire','Roques Hautes Provence','Musee du Calisson'],`Faktenstatus: abgeglichen mit offizieller Aix-Tourismusinformation zu Sainte-Victoire/Roques-Hautes; Zugang, Waldbrandlage und Wetter tagesaktuell prüfen.`),
      13: G([
        `Der Küstentag ist verführerisch, aber logistisch der gefährlichste Provence-Tag: Cassis, Calanques, Parken, Hitze, Buchungen, Menschen. Ihr braucht eine klare Entscheidung: ikonisch, aber aufwendiger – oder pragmatisch, aber entspannter.`,
        `Cassis mit Bootstour kann für Familien sehr gut sein, weil man die Calanques ohne lange Hitze-Wanderung sieht. La Ciotat ist oft familienpraktischer: Strand, Promenade, Mugel/Meerlogik, weniger „muss man gesehen haben“-Druck.`
      ],[
        S('Cassis + Calanques per Boot',`Wenn ihr Cassis macht, dann früh und mit Parkplatz-/Buchungsstrategie. Die offizielle Cassis-Seite beschreibt Bootstouren als familiengeeignete Möglichkeit, die Calanques zu erleben.`,['Bootszeiten vorher prüfen/buchen.','Nicht mittags erst losfahren.','Badesachen nur, wenn Ablauf realistisch ist.']),

      14: G([

      15: G([

      16: G([

        `Am Ende einer Station ist ein guter Abschluss wichtiger als Vollständigkeit. Kinder und Erwachsene profitieren davon, wenn nicht bis zum letzten Abend optimiert wird.`

      ],`Meine Empfehlung: Ein Lieblingsding, ein einfacher Abend, früh genug fertig.`,['Massif-Zugang prüfen, falls Naturabend.','Fahrtag-Sachen separat legen.','Kein spätes Restaurant, wenn morgen lang wird.'],[L('Aix Cours Mirabeau','Aix en Provence Cours Mirabeau'),L('Sainte-Victoire Abendblick','Montagne Sainte Victoire sunset viewpoint'),L('Le Tholonet Restaurants','Le Tholonet restaurant')],['Aix en Provence Cours Mirabeau','Sainte Victoire sunset','Le Tholonet restaurant','Provence evening'],`Faktenstatus: Abschlusslogik aus Reiserhythmus; Naturzugang und Restaurants aktuell prüfen.`),

    function render(title, eyebrow, body, side, imageQueries){
      root.innerHTML = `${galleryMarkup(imageQueries,title)}<p class='section-kicker'>${eyebrow}</p><h1>${title}</h1><div class='detail-grid'><section>${body}</section><aside>${side}${checkCard()}</aside></div>${chatGPTBoxMarkup()}`;
      document.title = `${title} · France 2026`;
      currentPrompt = buildChatGPTPrompt(title, eyebrow, body, side);
      setupChatGPTBox();
    }
    function renderGuide(item, guide){
      const body = `<div class='detail-lead'>${paragraphs(guide.intro)}</div>${guide.sections.map(section => `<div class='guide-section'><h3>${section.title}</h3><p>${section.body}</p>${section.custom || ''}${section.bullets ? list(section.bullets) : ''}</div>`).join('')}<h3>Meine Empfehlung für euch</h3><p>${guide.recommendation}</p><h3>Praktische Hinweise</h3>${list(guide.logistics)}<div class='fact-box'><strong>Fakten-/Quellenstatus:</strong><p class='source-note'>${guide.sourceNote}</p></div>`;
      render(item.title,`${item.date} · ${item.place}`,body,linksCard(guide.links),guide.imageQueries);
    }
    function linksCard(arr){ if(!arr || !arr.length) return ''; return `<div class='side-card'><h3>Direkte Links</h3>${arr.map(l => `<a href='${l.href || mapsLink(l.query)}' target='_blank' rel='noopener'>${l.label}</a>`).join('')}</div>`; }
    function checkCard(){ return `<div class='side-card'><h3>Vor Ort prüfen</h3><ul><li>Öffnungszeiten</li><li>Reservierung / Tickets</li><li>Parken</li><li>Hitze, Gewitter, Wasserstand oder Flaggen</li></ul></div>`; }
    function galleryMarkup(input,title){ const queries=normalizeGalleryQueries(input,title); return `<div class='image-gallery' aria-label='Bildergalerie'>${queries.map((q,i)=>`<figure class='gallery-card'><a href='${imageSourceUrl(q)}' target='_blank' rel='noopener'><img src='${galleryImageUrl(q,i)}' alt='${escapeHtml(q)}' loading='lazy' onerror="this.onerror=null;this.src='${fallbackUrl(title,i)}'"><figcaption>${escapeHtml(q)} · Herkunft öffnen ↗</figcaption></a></figure>`).join('')}</div>`; }
    function normalizeGalleryQueries(input,title){ let arr=Array.isArray(input)?input:[input]; arr=arr.flat().filter(Boolean).map(x=>String(x).trim()).filter(Boolean); arr=[...new Set(arr)]; const extras=[`${title} France`,`${title} travel`,`${title} landscape`,`${title} tourism`]; for(const e of extras){ if(arr.length>=4) break; if(!arr.includes(e)) arr.push(e); } return arr.slice(0,4); }
    function chatGPTBoxMarkup(){ return `<section class='ask-chatgpt'><h3>Diese Seite in ChatGPT fragen</h3><p>Kopiert einen vorbereiteten Prompt mit dem Kontext dieser Detailseite. Danach ChatGPT öffnen, einfügen und konkret nachfragen.</p><div class='ask-actions'><button type='button' data-copy-prompt>Prompt kopieren</button><button type='button' data-preview-prompt>Prompt anzeigen</button><a href='https://chatgpt.com/' target='_blank' rel='noopener'>ChatGPT öffnen ↗</a></div><p class='copy-status' data-copy-status aria-live='polite'></p><textarea class='prompt-preview' data-prompt-preview readonly></textarea></section>`; }
    function buildChatGPTPrompt(title, eyebrow, bodyHtml, sideHtml){ const context=[textFromHtml(bodyHtml),textFromHtml(sideHtml)].filter(Boolean).join('\n\n'); return `Du bist mein pragmatischer Reiseassistent für unseren Familienurlaub in Frankreich 2026.\n\nKontext der aktuellen Detailseite:\nTitel: ${title}\nEinordnung: ${eyebrow}\n\n${context}\n\nRahmenbedingungen:\n- Familie mit zwei Kindern, 8 und 10 Jahre.\n- Wir mögen Baden, Tiere, Ausflüge, Essen/Kaffee und aktive, aber nicht überladene Tage.\n- Im Zweifel lieber weniger Programm, mehr Pausen, Hitze beachten.\n- Antworte konkret, knapp und praktisch.\n- Nenne klare Optionen, Timing, Pack-/Reservierungshinweise.\n- Wenn es um Öffnungszeiten, Preise, Buchungen oder Wetter geht, sage klar, dass ich es aktuell prüfen soll.\n\nMeine Frage dazu:`; }
    function textFromHtml(html){ const div=document.createElement('div'); div.innerHTML=html||''; return div.textContent.replace(/\s+/g,' ').trim(); }
    async function copyText(text){ if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(text); return; } const textarea=document.createElement('textarea'); textarea.value=text; textarea.style.position='fixed'; textarea.style.left='-9999px'; document.body.appendChild(textarea); textarea.focus(); textarea.select(); const ok=document.execCommand('copy'); textarea.remove(); if(!ok) throw new Error('copy failed'); }
    function setupChatGPTBox(){ const copyButton=root.querySelector('[data-copy-prompt]'); const previewButton=root.querySelector('[data-preview-prompt]'); const preview=root.querySelector('[data-prompt-preview]'); const status=root.querySelector('[data-copy-status]'); copyButton?.addEventListener('click',async()=>{try{await copyText(currentPrompt);status.textContent='Prompt kopiert. Jetzt ChatGPT öffnen und einfügen.';}catch(e){preview.value=currentPrompt;preview.classList.add('open');preview.focus();preview.select();status.textContent='Automatisches Kopieren ging nicht. Prompt unten manuell kopieren.';}}); previewButton?.addEventListener('click',()=>{preview.value=currentPrompt;preview.classList.toggle('open'); if(preview.classList.contains('open')) preview.focus();}); }
    function imageQueriesForDestination(item){ if(item.id==='tours') return ['Tours Loire old town','Tours France market','Guinguette de Tours','Loire river Tours']; if(item.id==='moliets') return ['Moliets et Maa plage centrale','Plage Centrale Moliets','Moliets surf','Moliets Landes']; if(item.id==='tholonet') return ['Le Tholonet Sainte Victoire','Montagne Sainte Victoire','Aix en Provence countryside','Provence Le Tholonet']; return [item.title,...(item.links||[]).map(l=>l.query)]; }
    function verdict(item){ if(item.type==='Strand') return 'Passend, solange Strömung, Sonne, Flaggen und Pausen ernst genommen werden.'; if(item.type==='Aktivität') return 'Guter Baustein, wenn er nicht noch mit einem zweiten großen Programmpunkt überladen wird.'; if(item.type==='Ausflug') return 'Lohnend, wenn ihr ihn als schlanken Halbtagesausflug plant.'; return 'Guter Baustein, wenn ihr ihn flexibel versteht und vor Ort prüft.'; }
    function renderDestination(item){ const body=`<p class='detail-lead'>${item.deep||item.story}</p><div class='guide-section'><h3>Warum das für euch passt</h3><p>${item.familyAngle||item.story}</p></div><div class='guide-section'><h3>Konkrete Programmlogik</h3><p>Diese Station ist kein Selbstzweck. Nutzt sie als Basis für wenige starke Bausteine statt für Vollständigkeit.</p>${list(item.highlights)}</div><div class='guide-section'><h3>Prüfpunkte</h3>${list(item.tips)}</div><div class='fact-box'><strong>Fakten-/Quellenstatus:</strong><p class='source-note'>Stationstext basiert auf eurer Reiseroute, vorhandenen offiziellen Zielpunkten und den verlinkten Orts-/Maps-Suchen. Öffnungszeiten, Preise und Verfügbarkeiten aktuell prüfen.</p></div>`; render(item.title,'Stationsguide',body,linksCard(item.links),imageQueriesForDestination(item)); }
    function renderPoi(item){ const body=`<p class='detail-lead'>${item.text}</p><div class='guide-section'><h3>Was das konkret für euch bedeutet</h3><p>${item.why||item.text}</p></div><div class='guide-section'><h3>So würde ich es nutzen</h3><p>${verdict(item)}</p>${list(item.tips)}</div><div class='guide-section'><h3>Keine Halluzinationszone</h3><p>Konkrete Öffnungszeiten, Preise, Buchungen, Alters-/Größenregeln, Wasserbedingungen und Parkinfos werden hier bewusst nicht erfunden. Dafür immer den Link oder die aktuelle Suche prüfen.</p></div>`; render(item.name,`${item.type} · ${item.place}`,body,`<a class='maps-button' href='${mapsLink(item.query)}' target='_blank' rel='noopener'>In Google Maps öffnen</a>${linksCard(item.links)}`,[item.name,item.query,`${item.place||''} ${item.name}`,`${item.name} France`]); }
    function renderFood(item){ const body=`<p class='detail-lead'>${item.text}</p><div class='guide-section'><h3>Warum passt das?</h3><p>${item.why||item.text}</p></div><div class='guide-section'><h3>So würde ich entscheiden</h3>${list(item.tips)}<p>Für euch zählt hier weniger maximale Kulinarik, sondern kurze Wege, Stimmung, Kinderenergie und vegetarische Machbarkeit.</p></div><div class='guide-section'><h3>Vorher prüfen</h3><p>Öffnungszeiten, Reservierung, aktuelle Bewertungen und vegetarische Optionen bitte aktuell prüfen.</p></div>`; render(item.title,`Essen · ${item.place}`,body,item.query?`<a class='maps-button' href='${mapsLink(item.query)}' target='_blank' rel='noopener'>In Google Maps suchen</a>`:'',[item.query||item.title,`${item.place} restaurant`,`${item.place} terrace`,`${item.place} food`]); }

    if(type==='destination'){
      renderDestination(data.destinations.find(x=>x.id===id));
    } else if(type==='day'){
      const index=Number(id); const item=data.days[index]; const guide=dayGuides[index]; if(guide) renderGuide(item,guide); else render(item.title,`${item.date} · ${item.place}`,`<p>Keine Daten gefunden.</p>`,'',[]);
    } else if(type==='poi'){
      renderPoi(data.pois[Number(id)]);
    } else if(type==='food'){
      renderFood(data.food[Number(id)]);
    } else {
      root.innerHTML='<h1>Nichts gefunden</h1><p>Zurück zur Übersicht.</p>';
    }
  </script>
</body>
</html>
